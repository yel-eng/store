<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lensora — عالم العدسات الملونة</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5.1.0/index.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/playfair-display@5.1.0/index.min.css">
<style>
:root{
  --bg:#0a0808;--card-bg:rgba(18,14,12,.72);--gold:#c9a84c;--gold-light:#e8d5a3;
  --text:#f5ede0;--text-dim:#8a7e73;--radius:24px;--radius-sm:14px;
  --preview-dark:#121010;--preview-light:#f4f1ed;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px}
button{cursor:pointer;border:none;font-family:inherit}

.ambient{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.ambient-orb{position:absolute;border-radius:50%;filter:blur(150px);opacity:.06}
.ambient-orb:nth-child(1){width:600px;height:600px;background:#c9a84c;top:-15%;right:-10%;animation:orb1 22s ease-in-out infinite}
.ambient-orb:nth-child(2){width:500px;height:500px;background:#4A90D9;bottom:-10%;left:-8%;animation:orb2 28s ease-in-out infinite}
.ambient-orb:nth-child(3){width:350px;height:350px;background:#7B5EA7;top:45%;left:40%;animation:orb3 18s ease-in-out infinite}
@keyframes orb1{0%,100%{transform:translate(0,0)}33%{transform:translate(-100px,80px)}66%{transform:translate(60px,-50px)}}
@keyframes orb2{0%,100%{transform:translate(0,0)}33%{transform:translate(80px,-70px)}66%{transform:translate(-60px,40px)}}
@keyframes orb3{0%,100%{transform:translate(-50%,-50%)}33%{transform:translate(calc(-50%+80px),calc(-50%-50px))}66%{transform:translate(calc(-50%-50px),calc(-50%+80px))}}

#particlesCanvas{position:fixed;inset:0;pointer-events:none;z-index:1;opacity:.3}

.nav{position:fixed;top:0;left:0;right:0;z-index:1000;padding:18px 5%;display:flex;align-items:center;justify-content:space-between;background:rgba(6,4,4,.15);backdrop-filter:blur(20px);border-bottom:1px solid rgba(201,168,76,.04);transition:all .4s}
.nav.scrolled{background:rgba(8,6,6,.9);padding:12px 5%;border-bottom-color:rgba(201,168,76,.08)}
.nav-logo{font-family:'Playfair Display',serif;font-size:24px;color:var(--gold);letter-spacing:4px;display:flex;align-items:center;gap:12px}
.nav-logo svg{width:32px;height:32px;animation:logoSpin 20s linear infinite}
@keyframes logoSpin{to{transform:rotate(360deg)}}
.nav-logo span{font-size:10px;letter-spacing:3px;color:var(--text-dim);font-family:'Inter',sans-serif;display:block;font-weight:400}
.nav-actions{display:flex;gap:12px;align-items:center}
.cart-btn{background:rgba(201,168,76,.06);color:var(--gold);padding:12px 22px;border-radius:50px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;border:1px solid rgba(201,168,76,.08);transition:all .3s;position:relative;backdrop-filter:blur(10px)}
.cart-btn:hover{background:var(--gold);color:var(--bg);box-shadow:0 0 30px rgba(201,168,76,.2)}
.cart-badge{background:#e74c3c;color:#fff;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;position:absolute;top:-6px;left:-6px;animation:popBadge .4s cubic-bezier(.68,-.55,.27,1.55)}
@keyframes popBadge{from{transform:scale(0)}to{transform:scale(1)}}

.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;position:relative;overflow:hidden;padding:120px 5% 80px}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 30%,rgba(201,168,76,.04) 0%,transparent 70%),radial-gradient(ellipse 35% 35% at 15% 85%,rgba(74,144,217,.03) 0%,transparent 50%),radial-gradient(ellipse 35% 35% at 85% 85%,rgba(123,94,167,.03) 0%,transparent 50%)}
.hero-sphere-wrap{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:500px;height:500px;pointer-events:none;z-index:1}
.hero-sphere{position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle at 30% 25%,rgba(201,168,76,.12),transparent 60%),radial-gradient(circle at 70% 75%,rgba(201,168,76,.06),transparent 50%);box-shadow:0 0 80px rgba(201,168,76,.1),inset 0 0 60px rgba(201,168,76,.04);animation:sphereFloat 8s ease-in-out infinite,sphereGlow 4s ease-in-out infinite;filter:blur(1px)}
.hero-sphere::before{content:'';position:absolute;inset:20%;border-radius:50%;border:1px solid rgba(201,168,76,.15);animation:sphereRing 10s linear infinite}
.hero-sphere::after{content:'';position:absolute;inset:35%;border-radius:50%;border:1px solid rgba(201,168,76,.08);animation:sphereRing 15s linear infinite reverse}
@keyframes sphereFloat{0%,100%{transform:translate(-50%,-50%) translateY(0) scale(1)}50%{transform:translate(-50%,-50%) translateY(-20px) scale(1.02)}}
@keyframes sphereGlow{0%,100%{box-shadow:0 0 80px rgba(201,168,76,.1),inset 0 0 60px rgba(201,168,76,.04)}50%{box-shadow:0 0 120px rgba(201,168,76,.2),inset 0 0 80px rgba(201,168,76,.08)}}
@keyframes sphereRing{to{transform:rotate(360deg)}}
.sphere-particles{position:absolute;inset:-50px}
.sphere-particle{position:absolute;width:4px;height:4px;border-radius:50%;background:var(--gold);opacity:.5;animation:particleFloat 6s ease-in-out infinite;box-shadow:0 0 10px var(--gold)}
.sphere-particle:nth-child(1){top:10%;left:20%;animation-delay:0s}.sphere-particle:nth-child(2){top:30%;right:15%;animation-delay:1s}
.sphere-particle:nth-child(3){bottom:25%;left:10%;animation-delay:2s}.sphere-particle:nth-child(4){bottom:40%;right:25%;animation-delay:0.5s}
.sphere-particle:nth-child(5){top:50%;left:5%;animation-delay:1.5s}.sphere-particle:nth-child(6){top:15%;right:30%;animation-delay:2.5s}
@keyframes particleFloat{0%,100%{transform:translateY(0) scale(1);opacity:.5}50%{transform:translateY(-30px) scale(1.3);opacity:1}}

.hero-glass{position:relative;z-index:2;background:rgba(201,168,76,.015);backdrop-filter:blur(50px);border:1px solid rgba(201,168,76,.06);border-radius:36px;padding:70px 90px;max-width:820px;animation:heroIn 1.4s cubic-bezier(.22,1,.36,1) both;box-shadow:0 0 100px rgba(201,168,76,.02),inset 0 1px 0 rgba(255,255,255,.02)}
@keyframes heroIn{from{opacity:0;transform:translateY(50px) scale(.94);filter:blur(12px)}to{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}}
.hero-glass::before{content:'';position:absolute;inset:-1px;border-radius:37px;background:linear-gradient(135deg,rgba(201,168,76,.12) 0%,transparent 40%,transparent 60%,rgba(201,168,76,.06) 100%);z-index:-1}
.hero-glass::after{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:conic-gradient(from 0deg,transparent,rgba(201,168,76,.03),transparent,transparent);animation:shimmerRotate 10s linear infinite;z-index:-1}
@keyframes shimmerRotate{to{transform:rotate(360deg)}}
.hero-logo-wrap{margin-bottom:28px;animation:logoAnim 1.2s cubic-bezier(.22,1,.36,1) .4s both}
@keyframes logoAnim{from{opacity:0;transform:scale(.7) rotateY(30deg)}to{opacity:1;transform:scale(1) rotateY(0)}}
.hero-logo-wrap svg{width:110px;height:110px;filter:drop-shadow(0 0 40px rgba(201,168,76,.2))}
.hero-title{font-family:'Playfair Display',serif;font-size:clamp(40px,7vw,68px);color:var(--gold);letter-spacing:8px;margin-bottom:10px;animation:titleAnim 1.2s cubic-bezier(.22,1,.36,1) .6s both}
@keyframes titleAnim{from{opacity:0;transform:translateY(25px);letter-spacing:24px}to{opacity:1;transform:translateY(0);letter-spacing:8px}}
.hero-line{width:70px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:0 auto 28px;animation:lineGrow 1.2s ease .7s both}
@keyframes lineGrow{from{width:0;opacity:0}to{width:70px;opacity:1}}
.hero-sub{font-size:15px;color:var(--text-dim);max-width:500px;margin:0 auto;line-height:1.9;animation:fadeUp .9s ease .8s both}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.hero-scroll{position:absolute;bottom:36px;left:50%;transform:translateX(-50%);z-index:2;display:flex;flex-direction:column;align-items:center;gap:10px;animation:fadeUp 1s ease 1.3s both}
.hero-scroll span{font-size:10px;letter-spacing:3px;color:var(--text-dim);text-transform:uppercase}
.scroll-line{width:1px;height:45px;background:linear-gradient(180deg,var(--gold),transparent);animation:scrollPulse 2.5s ease-in-out infinite}
@keyframes scrollPulse{0%,100%{opacity:.2;transform:scaleY(.4);transform-origin:top}50%{opacity:1;transform:scaleY(1)}}

/* ========== SLIDER ========== */
.categories-section{padding:80px 5% 140px;max-width:1500px;margin:0 auto;position:relative;z-index:2}
.section-header{text-align:center;margin-bottom:60px}
.section-label{display:inline-flex;align-items:center;gap:10px;font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:16px}
.section-label::before,.section-label::after{content:'';width:40px;height:1px}
.section-label::before{background:linear-gradient(270deg,var(--gold),transparent)}
.section-label::after{background:linear-gradient(90deg,var(--gold),transparent)}
.section-title{font-family:'Playfair Display',serif;font-size:clamp(30px,4vw,44px);margin-bottom:12px}
.section-sub{color:var(--text-dim);font-size:14px}

.slider-container{position:relative}
.slider-viewport{
  overflow:hidden;padding:20px 0;
  -webkit-mask-image:linear-gradient(90deg,transparent 0%,black 8%,black 92%,transparent 100%);
  mask-image:linear-gradient(90deg,transparent 0%,black 8%,black 92%,transparent 100%);
}
.slider-track{display:flex;gap:28px;will-change:transform;direction:ltr}

.slider-card{
  flex:0 0 340px;position:relative;border-radius:var(--radius);overflow:hidden;cursor:pointer;
  background:var(--card-bg);backdrop-filter:blur(24px);border:1px solid rgba(201,168,76,.06);
  transition:transform .4s cubic-bezier(.22,1,.36,1),box-shadow .4s ease;
}
.slider-card:hover{transform:translateY(-12px) scale(1.03);box-shadow:0 30px 80px rgba(0,0,0,.6),0 0 60px rgba(201,168,76,.12)}
.slider-card .card-bg{position:absolute;inset:0;z-index:0;transition:opacity .4s,transform .6s ease}
.slider-card:hover .card-bg{opacity:.55;transform:scale(1.05)}
.slider-card::after{content:'';position:absolute;inset:0;z-index:1;background:linear-gradient(180deg,transparent 5%,rgba(18,14,12,.92) 75%);pointer-events:none}

.slider-card .card-border{position:absolute;inset:-2px;border-radius:calc(var(--radius)+2px);background:conic-gradient(from var(--angle,0deg),transparent,rgba(201,168,76,.4),transparent 30%,transparent 70%,rgba(201,168,76,.3),transparent);z-index:2;opacity:0;transition:opacity .4s;animation:borderSpin 5s linear infinite paused}
.slider-card:hover .card-border{opacity:1;animation-play-state:running}
@keyframes borderSpin{to{--angle:360deg}}
@property --angle{syntax:'<angle>';initial-value:0deg;inherits:false}

.slider-card .shimmer{position:absolute;top:0;left:-100%;width:50%;height:100%;background:linear-gradient(90deg,transparent,rgba(201,168,76,.12),transparent);transform:skewX(-20deg);transition:left .7s ease;z-index:3;pointer-events:none}
.slider-card:hover .shimmer{left:150%}

.card-visual{position:relative;height:230px;z-index:4;display:flex;align-items:center;justify-content:center;overflow:hidden}
.card-lens-sphere{position:relative;z-index:5;width:140px;height:140px;border-radius:50%;display:flex;align-items:center;justify-content:center;animation:lensFloat 5s ease-in-out infinite;transition:transform .5s ease,box-shadow .5s ease}
@keyframes lensFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.slider-card:hover .card-lens-sphere{transform:scale(1.2) translateY(-8px);animation-play-state:paused;box-shadow:0 0 50px rgba(201,168,76,.2)}
.card-lens-sphere::before{content:'';position:absolute;inset:-4px;border-radius:50%;border:1px solid rgba(255,255,255,.06);animation:ringSpin 8s linear infinite}
@keyframes ringSpin{to{transform:rotate(360deg)}}
.card-lens-inner{width:120px;height:120px;border-radius:50%;box-shadow:inset 0 0 30px rgba(0,0,0,.4)}
.card-dots{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:6}
.card-dot{width:22px;height:22px;border-radius:50%;border:2px solid rgba(255,255,255,.1);position:relative;overflow:hidden;transition:transform .3s}
.card-dot::after{content:'';position:absolute;inset:20%;border-radius:50%;background:linear-gradient(135deg,rgba(255,255,255,.25),transparent)}
.slider-card:hover .card-dot{transform:scale(1.25)}

.card-body{position:relative;z-index:4;padding:24px 28px}
.card-badge{display:inline-flex;align-items:center;gap:5px;padding:5px 14px;border-radius:50px;background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.12);font-size:9px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:14px}
.card-badge .dot{width:5px;height:5px;border-radius:50%;background:var(--gold);animation:pulseDot 2s infinite}
@keyframes pulseDot{0%,100%{opacity:1}50%{opacity:.4}}
.card-name{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;margin-bottom:8px;transition:color .3s}
.slider-card:hover .card-name{color:var(--gold-light)}
.card-count{font-size:11px;color:var(--text-dim);margin-bottom:18px}
.card-footer{display:flex;justify-content:space-between;align-items:center;padding-top:16px;border-top:1px solid rgba(201,168,76,.06)}
.card-price{font-size:13px;color:var(--text-dim)}
.card-price strong{font-size:20px;color:var(--gold);font-weight:700}
.card-btn{padding:9px 22px;border-radius:50px;background:linear-gradient(135deg,var(--gold),#b8943a);color:var(--bg);font-weight:700;font-size:11px;letter-spacing:1px;transition:all .3s;position:relative;overflow:hidden}
.card-btn::before{content:'';position:absolute;top:50%;left:50%;width:0;height:0;border-radius:50%;background:rgba(255,255,255,.3);transform:translate(-50%,-50%);transition:width .5s,height .5s}
.card-btn:hover::before{width:180px;height:180px}
.card-btn:hover{transform:translateY(-2px);box-shadow:0 5px 20px rgba(201,168,76,.3)}
.card-btn span{position:relative;z-index:1}

.slider-controls{display:flex;align-items:center;justify-content:center;gap:20px;margin-top:36px}
.slider-nav-btn{width:52px;height:52px;border-radius:50%;background:rgba(201,168,76,.06);backdrop-filter:blur(10px);border:1px solid rgba(201,168,76,.12);color:var(--gold);font-size:20px;display:flex;align-items:center;justify-content:center;transition:all .3s;cursor:pointer}
.slider-nav-btn:hover{background:var(--gold);color:var(--bg);transform:scale(1.1)}
.slider-nav-btn:active{transform:scale(.95)}
.slider-dots{display:flex;gap:10px;align-items:center}
.slider-dot{width:12px;height:12px;border-radius:50%;background:rgba(201,168,76,.12);transition:all .35s;cursor:pointer;border:2px solid transparent}
.slider-dot:hover{background:rgba(201,168,76,.3)}
.slider-dot.active{background:var(--gold);transform:scale(1.4);box-shadow:0 0 15px rgba(201,168,76,.5)}

/* ========== MODAL WITH BG TOGGLE ========== */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:2000;display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:all .4s;padding:20px;backdrop-filter:blur(12px)}
.modal-bg.open{opacity:1;visibility:visible}
.modal-box{background:var(--preview-dark);backdrop-filter:blur(40px);border-radius:var(--radius);width:100%;max-width:1000px;max-height:92vh;overflow-y:auto;border:1px solid rgba(201,168,76,.06);transform:scale(.92) translateY(40px);transition:transform .6s cubic-bezier(.22,1,.36,1),background-color .6s ease,box-shadow .6s ease;box-shadow:0 40px 100px rgba(0,0,0,.6)}
.modal-box.light-bg{background:var(--preview-light);border-color:rgba(0,0,0,.06)}
.modal-bg.open .modal-box{transform:scale(1) translateY(0)}

.modal-header{padding:24px 36px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(201,168,76,.04);position:sticky;top:0;background:var(--preview-dark);z-index:2;backdrop-filter:blur(20px);border-radius:var(--radius) var(--radius) 0 0;transition:background-color .6s ease}
.modal-box.light-bg .modal-header{background:var(--preview-light);border-bottom-color:rgba(0,0,0,.06)}
.modal-header h2{font-family:'Playfair Display',serif;font-size:26px;color:var(--gold)}
.modal-box.light-bg .modal-header h2{color:#b8943a}
.modal-actions{display:flex;align-items:center;gap:12px}

/* Background Toggle Button */
.bg-toggle{
  width:48px;height:48px;border-radius:14px;
  background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.1);
  color:var(--gold);font-size:18px;display:flex;align-items:center;justify-content:center;
  transition:all .3s;cursor:pointer;position:relative;overflow:hidden;
}
.bg-toggle:hover{background:rgba(201,168,76,.12)}
.modal-box.light-bg .bg-toggle{background:rgba(0,0,0,.04);border-color:rgba(0,0,0,.08);color:#5a4a3a}
.bg-toggle .icon-sun,.bg-toggle .icon-moon{position:absolute;transition:all .35s cubic-bezier(.22,1,.36,1);font-size:20px}
.bg-toggle .icon-sun{opacity:0;transform:rotate(180deg) scale(0)}
.bg-toggle .icon-moon{opacity:1;transform:rotate(0deg) scale(1)}
.modal-box.light-bg .bg-toggle .icon-sun{opacity:1;transform:rotate(0deg) scale(1)}
.modal-box.light-bg .bg-toggle .icon-moon{opacity:0;transform:rotate(-180deg) scale(0)}

.modal-close{width:44px;height:44px;border-radius:50%;background:rgba(201,168,76,.06);color:var(--gold);display:flex;align-items:center;justify-content:center;font-size:20px;transition:all .3s}
.modal-close:hover{background:var(--gold);color:var(--bg);transform:rotate(90deg)}
.modal-box.light-bg .modal-close{background:rgba(0,0,0,.04);color:#5a4a3a}
.modal-box.light-bg .modal-close:hover{background:#5a4a3a;color:#fff}

.slider-area{padding:40px 36px}
.lens-slider-container{position:relative;overflow:hidden;border-radius:var(--radius);padding:44px 36px;border:1px solid rgba(201,168,76,.04);transition:background .6s ease,border-color .6s ease}
.lens-slider-container.dark-bg{background:rgba(201,168,76,.012)}
.lens-slider-container.light-bg{background:rgba(0,0,0,.015);border-color:rgba(0,0,0,.04)}

.lens-slider-track{display:flex;transition:transform .6s cubic-bezier(.4,0,.2,1)}
.lens-slide{min-width:100%;display:flex;gap:48px;align-items:center;padding:0 10px}
.lens-visual{width:260px;height:260px;border-radius:50%;position:relative;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:box-shadow .6s ease}
.lens-visual.dark-bg{animation:lensGlow 4s ease-in-out infinite}
@keyframes lensGlow{0%,100%{box-shadow:0 0 50px rgba(201,168,76,.06)}50%{box-shadow:0 0 100px rgba(201,168,76,.12)}}
.lens-visual.light-bg{box-shadow:0 10px 40px rgba(0,0,0,.1)}

.lens-visual-ring{position:absolute;inset:-10px;border-radius:50%;border:1px solid rgba(255,255,255,.04);animation:ringRotate 12s linear infinite}
.modal-box.light-bg .lens-visual-ring{border-color:rgba(0,0,0,.04)}
.lens-visual-ring::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:8px;height:8px;border-radius:50%;background:var(--gold);box-shadow:0 0 12px var(--gold)}
.modal-box.light-bg .lens-visual-ring::before{background:#b8943a;box-shadow:0 0 12px #b8943a}
@keyframes ringRotate{to{transform:rotate(360deg)}}

.lens-visual-inner{width:220px;height:220px;border-radius:50%;position:relative;overflow:hidden;transition:box-shadow .6s ease}
.lens-visual-inner.dark-bg{box-shadow:inset 0 0 50px rgba(0,0,0,.3)}
.lens-visual-inner.light-bg{box-shadow:inset 0 0 30px rgba(255,255,255,.15)}
.lens-visual-inner::after{content:'';position:absolute;inset:18%;border-radius:50%;background:radial-gradient(circle,rgba(0,0,0,.12),transparent 65%)}
.modal-box.light-bg .lens-visual-inner::after{background:radial-gradient(circle,rgba(255,255,255,.25),transparent 65%)}

.lens-circle{width:100%;height:100%;border-radius:50%;transition:box-shadow .6s ease}
.lens-circle.dark-bg{box-shadow:0 0 40px rgba(0,0,0,.2)}
.lens-circle.light-bg{box-shadow:0 4px 20px rgba(0,0,0,.12)}

/* Color accuracy label */
.color-label{
  position:absolute;bottom:-28px;left:50%;transform:translateX(-50%);
  font-size:10px;letter-spacing:2px;color:var(--text-dim);white-space:nowrap;
  display:flex;align-items:center;gap:6px;
}
.color-label .dot-real{width:8px;height:8px;border-radius:50%;border:1px solid rgba(255,255,255,.15)}
.modal-box.light-bg .color-label{color:#8a7e73}
.modal-box.light-bg .color-label .dot-real{border-color:rgba(0,0,0,.1)}

.lens-details{flex:1}
.lens-details h3{font-family:'Playfair Display',serif;font-size:30px;color:var(--text);margin-bottom:12px;transition:color .6s ease}
.modal-box.light-bg .lens-details h3{color:#1a1614}
.lens-desc{font-size:15px;color:var(--text-dim);line-height:1.9;margin-bottom:28px;transition:color .6s ease}
.modal-box.light-bg .lens-desc{color:#6b6058}
.lens-meta{display:flex;gap:18px;margin-bottom:28px;flex-wrap:wrap}
.meta-item{background:rgba(201,168,76,.03);padding:16px 24px;border-radius:var(--radius-sm);border:1px solid rgba(201,168,76,.04);transition:all .3s}
.meta-item:hover{border-color:rgba(201,168,76,.12)}

/* ========== SMOOTH INFINITE SCROLL ========== */
function initSmoothSlider() {
  const track = document.getElementById('sliderTrack');
  const GAP = 28;
  const CARD_W = 340;
  const ITEM_W = CARD_W + GAP;
  const total = COLORS_DATA.length;

  let html = '';
  for (let c = 0; c < 6; c++) {
    for (let i = 0; i < total; i++) {
      html += createCard(COLORS_DATA[i], i);
    }
  }
  track.innerHTML = html;

  const cards = track.querySelectorAll('.slider-card');
  cards.forEach(c => c.style.flex = `0 0 ${CARD_W}px`);

  document.getElementById('sliderDots').innerHTML = COLORS_DATA.map((_, i) =>
    `<div class="slider-dot" data-idx="${i}"></div>`
  ).join('');

  let activeCatIdx = 0;
  let currentPos = 0;
  let isDragging = false;
  let dragStartX = 0;
  let dragStartPos = 0;
  let animFrame = null;
  let velocity = 0;
  let isAnimating = false;

  function getCenterOffset() {
    const vp = document.querySelector('.slider-viewport');
    return (vp.offsetWidth - CARD_W) / 2;
  }

  function snapToIndex(idx) {
    isAnimating = true;
    activeCatIdx = idx;
    const target = idx * ITEM_W;
    const centerOffset = getCenterOffset();
    const pos = target - centerOffset;
    cancelAnimationFrame(animFrame);
    animateTo(pos, () => { isAnimating = false; });
    updateDots(idx);
  }

  function animateTo(targetPos, callback) {
    const start = currentPos;
    const diff = targetPos - start;
    const duration = 500;
    const startTime = performance.now();
    function step(now) {
      const elapsed = now - startTime;
      const progress = Math.min(elapsed / duration, 1);
      const ease = 1 - Math.pow(1 - progress, 4);
      currentPos = start + diff * ease;
      track.style.transform = `translateX(-${currentPos}px)`;
      if (progress < 1) { animFrame = requestAnimationFrame(step); }
      else { if (callback) callback(); }
    }
    animFrame = requestAnimationFrame(step);
  }

  function updateDots(idx) {
    const normalized = ((idx % total) + total) % total;
    document.querySelectorAll('#sliderDots .slider-dot').forEach((d, i) => {
      d.classList.toggle('active', i === normalized);
    });
  }

  function getVisibleIndex() {
    const centerOffset = getCenterOffset();
    return Math.round((currentPos + centerOffset) / ITEM_W);
  }

  currentPos = -getCenterOffset();
  track.style.transform = `translateX(-${currentPos}px)`;
  updateDots(0);

  let autoplayInterval = setInterval(() => {
    if (!isDragging && !isAnimating) {
      activeCatIdx++;
      snapToIndex(activeCatIdx);
    }
  }, 3500);

  function resetAutoplay() {
    clearInterval(autoplayInterval);
    autoplayInterval = setInterval(() => {
      if (!isDragging && !isAnimating) { activeCatIdx++; snapToIndex(activeCatIdx); }
    }, 3500);
  }

  document.getElementById('prevBtn').onclick = () => { activeCatIdx--; snapToIndex(activeCatIdx); resetAutoplay(); };
  document.getElementById('nextBtn').onclick = () => { activeCatIdx++; snapToIndex(activeCatIdx); resetAutoplay(); };
  document.getElementById('sliderDots').onclick = (e) => {
    const dot = e.target.closest('.slider-dot');
    if (!dot) return;
    const idx = parseInt(dot.dataset.idx);
    const cur = getVisibleIndex();
    const offset = idx - ((cur % total) + total) % total;
    activeCatIdx = cur + offset;
    snapToIndex(activeCatIdx);
    resetAutoplay();
  };

  track.onclick = (e) => {
    const card = e.target.closest('.slider-card');
    if (!card || isDragging) return;
    const idx = parseInt(card.dataset.idx);
    currentModalCatIdx = idx;
    openLensModal(idx);
  };

  const startDrag = (x) => {
    isDragging = true; dragStartX = x; dragStartPos = currentPos; velocity = 0;
    cancelAnimationFrame(animFrame); isAnimating = false;
    track.style.transition = 'none';
  };
  const moveDrag = (x) => {
    if (!isDragging) return;
    const diff = x - dragStartX; velocity = diff; currentPos = dragStartPos - diff;
    track.style.transform = `translateX(-${currentPos}px)`;
  };
  const endDrag = () => {
    if (!isDragging) return; isDragging = false;
    const centerOffset = getCenterOffset();
    const rawIdx = (currentPos + centerOffset) / ITEM_W;
    let targetIdx = Math.round(rawIdx);
    if (Math.abs(velocity) > 50) targetIdx = velocity > 0 ? Math.floor(rawIdx) : Math.ceil(rawIdx);
    activeCatIdx = targetIdx; snapToIndex(targetIdx); resetAutoplay();
  };

  track.addEventListener('touchstart', e => startDrag(e.touches[0].clientX), {passive:true});
  track.addEventListener('touchmove', e => moveDrag(e.touches[0].clientX), {passive:true});
  track.addEventListener('touchend', endDrag);
  track.addEventListener('mousedown', e => { e.preventDefault(); startDrag(e.clientX); });
  document.addEventListener('mousemove', e => moveDrag(e.clientX));
  document.addEventListener('mouseup', endDrag);
}

function createCard(c, idx) {
  const mainLens = c.lenses[0];
  const totalStock = c.lenses.reduce((sum, l) => sum + (getProd(l.id)?.stock || 0), 0);
  const dots = c.lenses.map(l => `<div class="card-dot" style="background:${l.gradient}"></div>`).join('');
  return `
    <div class="slider-card" data-idx="${idx}">
      <div class="card-bg" style="background:${c.cardBg}"></div>
      <div class="card-border"></div>
      <div class="shimmer"></div>
      <div class="card-visual">
        <div class="card-lens-sphere"><div class="card-lens-inner" style="background:${mainLens.gradient}"></div></div>
        <div class="card-dots">${dots}</div>
      </div>
      <div class="card-body">
        <div class="card-badge"><span class="dot"></span>${c.arName}</div>
        <div class="card-name">${mainLens.name}</div>
        <div class="card-count">${c.lenses.length} تدرجات · ${totalStock} قطعة</div>
        <div class="card-footer">
          <div class="card-price">من <strong>${getProd(mainLens.id)?.price || 0} ر.س</strong></div>
          <button class="card-btn"><span>اكتشفي ✦</span></button>
        </div>
      </div>
    </div>`;
}

/* ========== MODAL BG TOGGLE ========== */
function toggleModalBg() {
  isLightBg = !isLightBg;
  const box = document.getElementById('modalBox');
  const container = document.getElementById('lensContainer');
  const visuals = container.querySelectorAll('.lens-visual');
  const inners = container.querySelectorAll('.lens-visual-inner');
  const circles = container.querySelectorAll('.lens-circle');

  box.classList.toggle('light-bg', isLightBg);
  container.classList.toggle('dark-bg', !isLightBg);
  container.classList.toggle('light-bg', isLightBg);

  visuals.forEach(v => { v.classList.toggle('dark-bg', !isLightBg); v.classList.toggle('light-bg', isLightBg); });
  inners.forEach(v => { v.classList.toggle('dark-bg', !isLightBg); v.classList.toggle('light-bg', isLightBg); });
  circles.forEach(v => { v.classList.toggle('dark-bg', !isLightBg); v.classList.toggle('light-bg', isLightBg); });
}

/* ========== LENS MODAL ========== */
function openLensModal(ci) {
  currentLensIdx = 0;
  isLightBg = false;
  const cat = COLORS_DATA[((ci % COLORS_DATA.length) + COLORS_DATA.length) % COLORS_DATA.length];
  document.getElementById('modalTitle').textContent = cat.arName;

  const box = document.getElementById('modalBox');
  box.classList.remove('light-bg');
  document.getElementById('lensContainer').classList.add('dark-bg');
  document.getElementById('lensContainer').classList.remove('light-bg');

  renderLensSlider(cat);
  document.getElementById('lensModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLensModal() {
  document.getElementById('lensModal').classList.remove('open');
  document.body.style.overflow = '';
}

function renderLensSlider(cat) {
  document.getElementById('lensTrack').innerHTML = cat.lenses.map((l, li) => {
    const p = getProd(l.id);
    const sc = p.stock === 0 ? 'stock-out' : p.stock <= 5 ? 'stock-low' : '';
    const st = p.stock === 0 ? 'نفذ' : p.stock <= 5 ? `باقي ${p.stock}` : `${p.stock} قطعة`;
    return `<div class="lens-slide">
      <div class="lens-visual dark-bg">
        <div class="lens-visual-ring"></div>
        <div class="lens-visual-inner dark-bg"><div class="lens-circle dark-bg" style="background:${l.gradient}"></div></div>
        <div class="color-label"><span class="dot-real" style="background:${l.color}"></span>اللون الفعلي على خلفية محايدة</div>
      </div>
      <div class="lens-details">
        <h3>${l.name}</h3>
        <p class="lens-desc">${l.desc}</p>
        <div class="lens-meta">
          <div class="meta-item"><div class="label">السعر</div><div class="value">${l.price} ر.س</div></div>
          <div class="meta-item"><div class="label">المتاح</div><div class="value ${sc}">${st}</div></div>
        </div>
        <div class="qty-selector">
          <label>الكمية:</label>
          <div class="qty-ctrl">
            <button onclick="changeModalQty(-1,${li})">−</button>
            <div class="qty-display" id="mq_${li}">1</div>
            <button onclick="changeModalQty(1,${li})">+</button>
          </div>
        </div>
        <button class="add-lens-btn" onclick="addFromSlider('${l.id}',${li})" ${p.stock===0?'disabled':''}>
          <span>${p.stock===0?'غير متوفر':'🛒 أضف للسلة'}</span>
        </button>
      </div>
    </div>`;
  }).join('');
  document.getElementById('lensSliderDots').innerHTML = cat.lenses.map((_, li) =>
    `<div class="slider-dot-modal ${li===0?'active':''}" onclick="goToLensSlide(${li})"></div>`
  ).join('');
  updateLensSlider();
}

function updateLensSlider() {
  document.getElementById('lensTrack').style.transform = `translateX(${currentLensIdx * 100}%)`;
  document.querySelectorAll('.slider-dot-modal').forEach((d, i) => d.classList.toggle('active', i === currentLensIdx));
  document.getElementById('lensPrevBtn').disabled = currentLensIdx === 0;
  const catName = document.getElementById('modalTitle').textContent;
  const cat = COLORS_DATA.find(c => c.arName === catName) || COLORS_DATA[0];
  document.getElementById('lensNextBtn').disabled = currentLensIdx >= cat.lenses.length - 1;
}
function slideLensMove(dir) {
  const catName = document.getElementById('modalTitle').textContent;
  const cat = COLORS_DATA.find(c => c.arName === catName) || COLORS_DATA[0];
  currentLensIdx = Math.max(0, Math.min(cat.lenses.length - 1, currentLensIdx + dir));
  updateLensSlider();
}
function goToLensSlide(i) { currentLensIdx = i; updateLensSlider(); }

function changeModalQty(delta, li) {
  const el = document.getElementById(`mq_${li}`);
  if (!el) return;
  let v = parseInt(el.textContent) + delta;
  const catName = document.getElementById('modalTitle').textContent;
  const cat = COLORS_DATA.find(c => c.arName === catName) || COLORS_DATA[0];
  const p = getProd(cat.lenses[li]?.id);
  v = Math.max(1, Math.min(v, Math.max(1, p?.stock || 1)));
  el.textContent = v;
}

function addFromSlider(lensId, li) {
  const p = getProd(lensId);
  if (!p || p.stock <= 0) return;
  const el = document.getElementById(`mq_${li}`);
  const qty = el ? parseInt(el.textContent) : 1;
  const inCart = cart.find(c => c.productId === lensId);
  if (inCart) { if (inCart.qty + qty > p.stock) { showToast('⚠️ الكمية تتجاوز المتاح'); return; } inCart.qty += qty; }
  else { if (qty > p.stock) { showToast('⚠️ الكمية غير متاحة'); return; } cart.push({ productId: lensId, qty }); }
  saveData(); updateCartBadge(); showToast(`✅ تمت إضافة "${p.name}" (${qty} قطعة)`);
  const qtyEl = document.getElementById(`mq_${li}`); if (qtyEl) qtyEl.textContent = '1';
}

/* ========== CART ========== */
function updateCartBadge() { const t = cart.reduce((s, c) => s + c.qty, 0); const b = document.getElementById('cartBadge'); b.textContent = t; b.style.display = t > 0 ? 'flex' : 'none'; }
function openCart() { document.getElementById('cartOverlay').classList.add('open'); document.getElementById('cartPanel').classList.add('open'); renderCart(); }
function closeCart() { document.getElementById('cartOverlay').classList.remove('open'); document.getElementById('cartPanel').classList.remove('open'); }

function renderCart() {
  const list = document.getElementById('cartItemsList'); const bottom = document.getElementById('cartBottom');
  if (cart.length === 0) { list.innerHTML = '<div class="cart-empty"><div class="ce-icon">👁️</div><p>السلة فارغة</p></div>'; bottom.innerHTML = ''; return; }
  list.innerHTML = cart.map(c => { const p = getProd(c.productId); if (!p) return ''; return `<div class="ci"><div class="ci-color" style="background:${p.gradient}"></div><div class="ci-info"><div class="ci-name">${p.name}</div><div class="ci-cat">${p.categoryName}</div><div class="ci-bottom"><span class="ci-price">${p.price * c.qty} ر.س</span><div class="ci-qty"><button onclick="changeCartQty('${c.productId}',-1)">−</button><span>${c.qty}</span><button onclick="changeCartQty('${c.productId}',1)">+</button></div></div></div><button class="ci-remove" onclick="removeFromCart('${c.productId}')">🗑</button></div>`; }).join('');
  const sub = cart.reduce((s, c) => { const p = getProd(c.productId); return s + (p ? p.price * c.qty : 0); }, 0);
  const ship = sub >= 200 ? 0 : 15; const total = sub + ship;
  bottom.innerHTML = `<div class="cb-row"><span>المجموع</span><span>${sub} ر.س</span></div><div class="cb-row"><span>الشحن ${ship===0?'(مجاني)':''}</span><span>${ship===0?'مجاني':ship+' ر.س'}</span></div><div class="cb-row total"><span>الإجمالي</span><span>${total} ر.س</span></div><button class="checkout-btn" onclick="checkout()">🧾 إتمام الشراء</button>`;
}
function changeCartQty(pid, delta) { const item = cart.find(c => c.productId === pid); const p = getProd(pid); if (!item || !p) return; item.qty += delta; if (item.qty <= 0) { removeFromCart(pid); return; } if (item.qty > p.stock) { item.qty = p.stock; showToast('⚠️ الحد الأقصى'); } saveData(); updateCartBadge(); renderCart(); }
function removeFromCart(pid) { cart = cart.filter(c => c.productId !== pid); saveData(); updateCartBadge(); renderCart(); }
function checkout() { if (cart.length === 0) return; cart.forEach(c => { const p = getProd(c.productId); if (p) p.stock = Math.max(0, p.stock - c.qty); }); showToast('✅ تم الشراء بنجاح!'); cart = []; saveData(); updateCartBadge(); closeCart(); }

/* ========== TOAST & PARTICLES ========== */
function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeLensModal(); closeCart(); } });

const canvas = document.getElementById('particlesCanvas'); const ctx = canvas.getContext('2d'); let particles = [];
function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resizeCanvas(); window.addEventListener('resize', resizeCanvas);
class Particle {
  constructor() { this.reset(); }
  reset() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.size = Math.random() * 1.5 + 0.5; this.sx = (Math.random() - 0.5) * 0.25; this.sy = (Math.random() - 0.5) * 0.15; this.op = Math.random() * 0.35 + 0.08; this.pulse = Math.random() * Math.PI * 2; this.ps = Math.random() * 0.02 + 0.005; }
  update() { this.x += this.sx; this.y += this.sy; this.pulse += this.ps; if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset(); }
  draw() { const a = this.op * (0.5 + 0.5 * Math.sin(this.pulse)); ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fillStyle = `rgba(201,168,76,${a})`; ctx.fill(); }
}
for (let i = 0; i < 60; i++) particles.push(new Particle());
(function anim() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(anim); })();

window.addEventListener('scroll', () => { document.getElementById('mainNav').classList.toggle('scrolled', window.scrollY > 60); });

initSmoothSlider(); updateCartBadge();
</script>
</body>
