<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lensora — عالم العدسات الملونة</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5.1.0/index.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/playfair-display@5.1.0/index.min.css">
<style>
:root{
  --bg:#0a0808;
  --card-bg:rgba(20,16,14,.7);
  --gold:#c9a84c;
  --gold-light:#e8d5a3;
  --text:#f5ede0;
  --text-dim:#8b7355;
  --radius:28px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;min-height:100vh}
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--gold);border-radius:4px}
button{cursor:pointer;border:none;font-family:inherit}

/* ✨ HERO WITH BACKGROUND IMAGE */
.hero{
  min-height:100vh;position:relative;display:flex;align-items:center;justify-content:center;
  overflow:hidden;padding:120px 5% 80px;
}
.hero-bg-image{
  position:absolute;inset:0;
  background:url('https://images.unsplash.com/photo-1516551246649-76e7a6229394?w=1920&q=80') center/cover no-repeat;
  opacity:.4;
  filter:brightness(.6) saturate(1.2);
  z-index:0;
}
.hero-bg-image::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(10,8,8,.4) 0%,rgba(10,8,8,.85) 100%);
}
.hero-golden-glow{
  position:absolute;top:30%;left:50%;transform:translate(-50%,-50%);
  width:700px;height:700px;border-radius:50%;
  background:radial-gradient(circle,rgba(201,168,76,.15) 0%,transparent 70%);
  filter:blur(60px);animation:pulseGlow 6s ease-in-out infinite;z-index:1;
}
@keyframes pulseGlow{0%,100%{opacity:.5;transform:translate(-50%,-50%) scale(1)}50%{opacity:.8;transform:translate(-50%,-50%) scale(1.1)}}

.hero-content{position:relative;z-index:2;text-align:center;max-width:900px}
.hero-badge{
  display:inline-flex;align-items:center;gap:8px;
  padding:8px 20px;border-radius:50px;
  background:rgba(201,168,76,.15);backdrop-filter:blur(10px);
  border:1px solid rgba(201,168,76,.3);
  font-size:11px;color:var(--gold);letter-spacing:3px;text-transform:uppercase;
  margin-bottom:24px;animation:slideInDown .8s ease both;
}
@keyframes slideInDown{from{opacity:0;transform:translateY(-30px)}to{opacity:1;transform:translateY(0)}}
.hero-badge::before{content:'✦';animation:twinkle 2s infinite}
@keyframes twinkle{0%,100%{opacity:1}50%{opacity:.3}}

.hero-title{
  font-family:'Playfair Display',serif;font-size:clamp(48px,10vw,88px);
  color:var(--gold);letter-spacing:12px;margin-bottom:16px;
  text-shadow:0 0 60px rgba(201,168,76,.3);
  animation:fadeInUp .8s ease .2s both;
}
@keyframes fadeInUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}

.hero-line{
  width:100px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);
  margin:0 auto 24px;animation:lineExpand 1s ease .4s both;
}
@keyframes lineExpand{from{width:0;opacity:0}to{width:100px;opacity:1}}

.hero-sub{
  font-size:16px;color:var(--text);opacity:.85;max-width:600px;margin:0 auto 32px;line-height:2;
  animation:fadeInUp .8s ease .6s both;
}

.hero-cta{
  display:flex;gap:16px;justify-content:center;flex-wrap:wrap;
  animation:fadeInUp .8s ease .8s both;
}
.btn-primary{
  padding:16px 40px;border-radius:50px;
  background:linear-gradient(135deg,var(--gold),#b8943a);
  color:var(--bg);font-weight:700;font-size:14px;letter-spacing:2px;
  transition:all .3s;position:relative;overflow:hidden;
}
.btn-primary::before{
  content:'';position:absolute;top:50%;left:50%;
  width:0;height:0;border-radius:50%;background:rgba(255,255,255,.3);
  transform:translate(-50%,-50%);transition:width .6s,height .6s;
}
.btn-primary:hover::before{width:300px;height:300px}
.btn-primary:hover{transform:translateY(-3px);box-shadow:0 10px 40px rgba(201,168,76,.4)}

.btn-secondary{
  padding:16px 40px;border-radius:50px;
  background:transparent;color:var(--gold);font-weight:600;font-size:14px;letter-spacing:2px;
  border:1px solid rgba(201,168,76,.4);backdrop-filter:blur(10px);
  transition:all .3s;
}
.btn-secondary:hover{background:rgba(201,168,76,.1);border-color:var(--gold);transform:translateY(-3px)}

.hero-scroll{
  position:absolute;bottom:40px;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:10px;
  animation:fadeIn .8s ease 1.2s both;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.hero-scroll span{font-size:10px;letter-spacing:3px;color:var(--text-dim);text-transform:uppercase}
.scroll-mouse{
  width:26px;height:42px;border:2px solid rgba(201,168,76,.4);border-radius:20px;
  position:relative;
}
.scroll-mouse::before{
  content:'';position:absolute;top:8px;left:50%;transform:translateX(-50%);
  width:4px;height:8px;background:var(--gold);border-radius:2px;
  animation:scrollWheel 2s ease-in-out infinite;
}
@keyframes scrollWheel{0%,100%{opacity:1;top:8px}50%{opacity:.3;top:18px}}

/* NAV */
.nav{
  position:fixed;top:0;left:0;right:0;z-index:1000;padding:20px 5%;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(10,8,8,.3);backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(201,168,76,.05);transition:all .4s;
}
.nav.scrolled{background:rgba(10,8,8,.95);padding:14px 5%;border-bottom-color:rgba(201,168,76,.15)}
.nav-logo{font-family:'Playfair Display',serif;font-size:26px;color:var(--gold);letter-spacing:4px;display:flex;align-items:center;gap:12px}
.nav-logo svg{width:36px;height:36px;animation:rotate 20s linear infinite}
@keyframes rotate{to{transform:rotate(360deg)}}
.nav-logo span{font-size:10px;letter-spacing:3px;color:var(--text-dim);font-family:'Inter',sans-serif;display:block;font-weight:400}
.nav-actions{display:flex;gap:12px;align-items:center}
.cart-btn{
  background:rgba(201,168,76,.1);color:var(--gold);padding:12px 24px;
  border-radius:50px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;
  border:1px solid rgba(201,168,76,.2);transition:all .3s;position:relative;
}
.cart-btn:hover{background:var(--gold);color:var(--bg);box-shadow:0 0 30px rgba(201,168,76,.3)}
.cart-badge{
  background:#e74c3c;color:#fff;width:22px;height:22px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;
  position:absolute;top:-8px;left:-8px;animation:pop .4s cubic-bezier(.68,-.55,.27,1.55);
}
@keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}

/* ========== CREATIVE SLIDER SECTION ========== */
.categories-section{padding:100px 5%;position:relative;z-index:2}
.section-header{text-align:center;margin-bottom:60px}
.section-label{
  display:inline-flex;align-items:center;gap:10px;
  font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);
  margin-bottom:16px;padding:6px 20px;border-radius:50px;
  background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.15);
}
.section-title{font-family:'Playfair Display',serif;font-size:clamp(32px,5vw,48px);margin-bottom:12px;color:var(--gold)}
.section-sub{color:var(--text-dim);font-size:14px}

/* ✨ CREATIVE 3D SLIDER */
.slider-wrapper{position:relative;perspective:2000px;padding:60px 0}
.slider-track{
  display:flex;gap:32px;transition:transform .8s cubic-bezier(.22,1,.36,1);
  padding:40px 60px;cursor:grab;
}
.slider-track:active{cursor:grabbing}

/* 🎨 CREATIVE 3D CARD */
.slider-card{
  flex:0 0 380px;position:relative;border-radius:var(--radius);
  transform-style:preserve-3d;transition:all .6s cubic-bezier(.22,1,.36,1);
  cursor:pointer;opacity:0;transform:translateX(100px) rotateY(-15deg);
}
.slider-card.revealed{opacity:1;transform:translateX(0) rotateY(0)}
.slider-card:hover{transform:translateY(-20px) translateZ(40px) rotateY(2deg);z-index:10}

/* Card Background Image - CLEAR & VISIBLE */
.card-bg-image{
  position:absolute;inset:0;border-radius:var(--radius);
  background-size:cover;background-position:center;background-repeat:no-repeat;
  opacity:.5;transition:all .6s ease;
  filter:brightness(.85) saturate(1.1);
}
.slider-card:hover .card-bg-image{opacity:.65;transform:scale(1.08);filter:brightness(.9) saturate(1.2)}

/* Glassmorphism Card Surface */
.slider-card::before{
  content:'';position:absolute;inset:0;border-radius:var(--radius);
  background:linear-gradient(135deg,rgba(255,255,255,.1),rgba(255,255,255,.02));
  backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);
  z-index:1;
}

/* Animated Border Glow */
.slider-card::after{
  content:'';position:absolute;inset:-2px;border-radius:calc(var(--radius) + 2px);
  background:conic-gradient(from var(--angle,0deg),transparent,rgba(201,168,76,.5),transparent 30%,transparent 70%,rgba(201,168,76,.3),transparent);
  z-index:0;opacity:0;transition:opacity .4s;animation:borderRotate 6s linear infinite paused;
}
.slider-card:hover::after{opacity:1;animation-play-state:running}
@keyframes borderRotate{to{--angle:360deg}}
@property --angle{syntax:'<angle>';initial-value:0deg;inherits:false}

/* Shimmer Effect */
.card-shimmer{
  position:absolute;top:0;left:-100%;width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);
  transform:skewX(-20deg);transition:left .8s ease;z-index:2;pointer-events:none;
  border-radius:var(--radius);
}
.slider-card:hover .card-shimmer{left:160%}

/* Card Content */
.card-content{position:relative;z-index:3;padding:28px;height:100%;display:flex;flex-direction:column}
.card-visual{
  position:relative;height:220px;margin-bottom:20px;
  display:flex;align-items:center;justify-content:center;
}

/* 3D Floating Lens */
.lens-container{
  position:relative;width:160px;height:160px;border-radius:50%;
  transform-style:preserve-3d;animation:floatLens 6s ease-in-out infinite;
  transition:transform .6s;
}
@keyframes floatLens{0%,100%{transform:translateY(0) rotateX(10deg)}50%{transform:translateY(-15px) rotateX(15deg)}}
.slider-card:hover .lens-container{transform:scale(1.15) rotateX(20deg);animation-play-state:paused}

.lens-ring{
  position:absolute;inset:-10px;border-radius:50%;
  border:2px solid rgba(201,168,76,.2);
  animation:ringPulse 4s ease-in-out infinite;
}
@keyframes ringPulse{0%,100%{transform:scale(1);opacity:.3}50%{transform:scale(1.05);opacity:.6}}

.lens-sphere{
  width:100%;height:100%;border-radius:50%;
  box-shadow:inset 0 0 40px rgba(0,0,0,.4),0 0 40px rgba(201,168,76,.2);
  position:relative;overflow:hidden;
}
.lens-sphere::before{
  content:'';position:absolute;inset:15%;border-radius:50%;
  background:radial-gradient(circle at 30% 25%,rgba(255,255,255,.25),transparent 60%);
}

/* Color Dots */
.color-dots{
  position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  display:flex;gap:8px;z-index:4;
}
.color-dot{
  width:24px;height:24px;border-radius:50%;
  border:2px solid rgba(255,255,255,.3);
  position:relative;overflow:hidden;
  transition:all .3s;cursor:pointer;
}
.color-dot::after{
  content:'';position:absolute;inset:25%;border-radius:50%;
  background:linear-gradient(135deg,rgba(255,255,255,.3),transparent);
}
.slider-card:hover .color-dot{transform:scale(1.2)}
.color-dot:hover{transform:scale(1.3);border-color:var(--gold)}

/* Card Info */
.card-info{flex:1;display:flex;flex-direction:column}
.card-category{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 14px;border-radius:50px;
  background:rgba(201,168,76,.12);
  border:1px solid rgba(201,168,76,.2);
  font-size:10px;color:var(--gold);letter-spacing:2px;
  text-transform:uppercase;margin-bottom:12px;width:fit-content;
}
.card-category .dot{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:glowDot 2s infinite}
@keyframes glowDot{0%,100%{box-shadow:0 0 0 0 rgba(201,168,76,.4)}50%{box-shadow:0 0 0 6px rgba(201,168,76,0)}}

.card-name{
  font-family:'Playfair Display',serif;font-size:24px;font-weight:700;
  margin-bottom:8px;transition:color .3s;
}
.slider-card:hover .card-name{color:var(--gold-light)}

.card-desc{font-size:12px;color:var(--text-dim);line-height:1.8;margin-bottom:16px}

.card-stats{
  display:flex;gap:16px;margin-bottom:20px;padding:12px 0;
  border-top:1px solid rgba(201,168,76,.1);
  border-bottom:1px solid rgba(201,168,76,.1);
}
.stat{display:flex;flex-direction:column;gap:4px}
.stat-value{font-size:18px;font-weight:700;color:var(--gold)}
.stat-label{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px}

.card-footer{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:auto;padding-top:16px;
}
.card-price{font-size:14px;color:var(--text-dim)}
.card-price strong{font-size:22px;color:var(--gold);font-weight:700}

.card-explore{
  padding:10px 24px;border-radius:50px;
  background:linear-gradient(135deg,var(--gold),#b8943a);
  color:var(--bg);font-weight:700;font-size:11px;letter-spacing:1px;
  transition:all .3s;position:relative;overflow:hidden;
}
.card-explore::before{
  content:'';position:absolute;top:50%;left:50%;
  width:0;height:0;border-radius:50%;background:rgba(255,255,255,.3);
  transform:translate(-50%,-50%);transition:width .5s,height .5s;
}
.card-explore:hover::before{width:200px;height:200px}
.card-explore:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(201,168,76,.4)}

/* Slider Controls */
.slider-controls{
  display:flex;justify-content:center;align-items:center;gap:20px;margin-top:40px;
}
.slider-btn{
  width:56px;height:56px;border-radius:50%;
  background:rgba(201,168,76,.08);backdrop-filter:blur(10px);
  border:1px solid rgba(201,168,76,.2);color:var(--gold);
  font-size:22px;display:flex;align-items:center;justify-content:center;
  transition:all .3s;cursor:pointer;
}
.slider-btn:hover{background:var(--gold);color:var(--bg);transform:scale(1.1)}
.slider-btn:disabled{opacity:.2;cursor:not-allowed;transform:none}

.slider-indicators{display:flex;gap:10px}
.indicator{
  width:12px;height:12px;border-radius:50%;
  background:rgba(201,168,76,.2);border:2px solid transparent;
  transition:all .3s;cursor:pointer;
}
.indicator:hover{background:rgba(201,168,76,.4)}
.indicator.active{background:var(--gold);transform:scale(1.4);box-shadow:0 0 15px rgba(201,168,76,.5)}

/* NAV, CART, MODAL, FOOTER styles remain similar... */
/* (Keeping them concise for brevity) */

/* CART & MODAL STYLES */
.cart-overlay,.modal-bg,.inv-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:2000;opacity:0;visibility:hidden;transition:all .4s;backdrop-filter:blur(10px)}
.cart-overlay.open,.modal-bg.open,.inv-overlay.open{opacity:1;visibility:visible}
.cart-panel{position:fixed;top:0;left:0;width:460px;max-width:100%;height:100vh;background:rgba(12,10,10,.98);z-index:2001;transform:translateX(-100%);transition:transform .5s cubic-bezier(.22,1,.36,1);display:flex;flex-direction:column}
.cart-panel.open{transform:translateX(0)}
.modal-box{background:rgba(12,10,10,.98);border-radius:var(--radius);width:100%;max-width:900px;max-height:90vh;overflow-y:auto;margin:20px;transform:scale(.9);transition:transform .6s}
.modal-bg.open .modal-box{transform:scale(1)}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);background:rgba(20,16,14,.95);border:1px solid rgba(201,168,76,.3);color:var(--text);padding:16px 32px;border-radius:50px;z-index:9999;transition:transform .5s;backdrop-filter:blur(10px)}
.toast.show{transform:translateX(-50%) translateY(0)}
.footer{text-align:center;padding:40px 5%;border-top:1px solid rgba(201,168,76,.08);color:var(--text-dim);font-size:13px}

@media(max-width:768px){
  .hero-title{letter-spacing:6px;font-size:clamp(36px,8vw,56px)}
  .slider-card{flex:0 0 300px}
  .slider-track{padding:40px 20px}
  .cart-panel{width:100%}
}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav" id="mainNav">
  <div class="nav-logo">
    <svg viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="18" stroke="#c9a84c" stroke-width="1" opacity=".3"/><circle cx="20" cy="20" r="12" stroke="#c9a84c" stroke-width=".5" opacity=".2"/><circle cx="20" cy="20" r="8" fill="url(#lg1)" opacity=".7"/><defs><radialGradient id="lg1" cx="40%" cy="35%"><stop offset="0%" stop-color="#e8d5a3"/><stop offset="100%" stop-color="#8B7355"/></radialGradient></defs></svg>
    <div>LENSORA<span>عدسات ملونة فاخرة</span></div>
  </div>
  <div class="nav-actions">
    <button class="cart-btn" onclick="openCart()">🛒 السلة <span class="cart-badge" id="cartBadge" style="display:none">0</span></button>
  </div>
</nav>

<!-- ✨ HERO WITH BACKGROUND -->
<header class="hero">
  <div class="hero-bg-image"></div>
  <div class="hero-golden-glow"></div>
  
  <div class="hero-content">
    <div class="hero-badge">مجموعة 2025 الحصرية</div>
    <h1 class="hero-title">LENSORA</h1>
    <div class="hero-line"></div>
    <p class="hero-sub">اكتشفي عالماً ساحراً من الألوان مع عدساتنا الملونة الفاخرة — جمالك الطبيعي بإطلالة استثنائية</p>
    <div class="hero-cta">
      <button class="btn-primary" onclick="document.getElementById('categories').scrollIntoView({behavior:'smooth'})">تصفحي المجموعة ✦</button>
      <button class="btn-secondary" onclick="openCart()">عرض السلة 🛒</button>
    </div>
  </div>
  
  <div class="hero-scroll">
    <span>اسحبي للأسفل</span>
    <div class="scroll-mouse"></div>
  </div>
</header>

<!-- CREATIVE SLIDER SECTION -->
<section class="categories-section" id="categories">
  <div class="section-header">
    <div class="section-label">👁️ مجموعتنا الفاخرة</div>
    <h2 class="section-title">اختاري لونك المميز</h2>
    <p class="section-sub">كل مجموعة تحكي قصة مختلفة — اكتشفيها</p>
  </div>
  
  <div class="slider-wrapper">
    <div class="slider-track" id="sliderTrack"></div>
  </div>
  
  <div class="slider-controls">
    <button class="slider-btn" id="prevBtn" onclick="slideMove(-1)">←</button>
    <div class="slider-indicators" id="indicators"></div>
    <button class="slider-btn" id="nextBtn" onclick="slideMove(1)">→</button>
  </div>
</section>

<!-- CART -->
<div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>
<div class="cart-panel" id="cartPanel">
  <div style="padding:24px;border-bottom:1px solid rgba(201,168,76,.1);display:flex;justify-content:space-between;align-items:center">
    <h2 style="font-family:'Playfair Display',serif;color:var(--gold);font-size:24px">🛒 سلة المشتريات</h2>
    <button onclick="closeCart()" style="width:40px;height:40px;border-radius:50%;background:rgba(201,168,76,.1);color:var(--gold);font-size:18px">✕</button>
  </div>
  <div id="cartItems" style="flex:1;overflow-y:auto;padding:20px"></div>
  <div id="cartFooter" style="padding:24px;border-top:1px solid rgba(201,168,76,.1)"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<div class="footer">© 2025 LENSORA — جميع الحقوق محفوظة ✨</div>

<script>
const COLORS_DATA=[

    {id:'b2',name:'شوكولاتة',desc:'بني غامق عميق ساحر',price:95,stock:22,color:'#5C3A1E',gradient:'radial-gradient(circle at 40% 35%,#7B5230,#4A2A10,#2E1808)'},
    {id:'b3',name:'كراميل',desc:'بني فاتح كريمي ناعم',price:90,stock:18,color:'#C68642',gradient:'radial-gradient(circle at 40% 35%,#C68642,#8B5E3C,#5C3A1E)'}
  ]},
  {id:'blue',arName:'أزرق ساحر',natureBg:'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=800&q=80',lenses:[
    {id:'bl1',name:'محيط',desc:'أزرق محيطي عميق',price:110,stock:25,color:'#2E6CB5',gradient:'radial-gradient(circle at 40% 35%,#5B9BD5,#2E6CB5,#1B3A5C)'},
    {id:'bl2',name:'سماء',desc:'أزرق سماوي صافي',price:100,stock:15,color:'#87CEEB',gradient:'radial-gradient(circle at 40% 35%,#87CEEB,#5BA3D9,#3A7BBF)'},
    {id:'bl3',name:'ثلجي',desc:'أزرق فاتح ثلجي',price:120,stock:8,color:'#B8D4E8',gradient:'radial-gradient(circle at 40% 35%,#D0E4F0,#A8C8DC,#7BAFC8)'}
  ]},
  {id:'green',arName:'أخضر زمردي',natureBg:'https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=800&q=80',lenses:[
    {id:'g1',name:'زيتون',desc:'أخضر زيتوني هادئ',price:105,stock:20,color:'#6B8E4E',gradient:'radial-gradient(circle at 40% 35%,#8BA85C,#6B8E4E,#4A6B32)'},
    {id:'g2',name:'زمردي',desc:'أخضر زمردي لامع',price:130,stock:10,color:'#2E8B57',gradient:'radial-gradient(circle at 40% 35%,#3CB371,#2E8B57,#1B5E3B)'},
    {id:'g3',name:'فيروزي',desc:'أخضر فيروزي منعش',price:115,stock:5,color:'#40B5A5',gradient:'radial-gradient(circle at 40% 35%,#5CD4C4,#40B5A5,#2A8A7B)'}
  ]},
  {id:'gray',arName:'رمادي أنيق',natureBg:'https://images.unsplash.com/photo-1464822759085-2f366f9c9c6b?w=800&q=80',lenses:[
    {id:'gr1',name:'فضي',desc:'رمادي فضي لامع',price:100,stock:28,color:'#B8B8B8',gradient:'radial-gradient(circle at 40% 35%,#D0D0D0,#A8A8A8,#787878)'},
    {id:'gr2',name:'فحمي',desc:'رمادي فحمي قوي',price:95,stock:16,color:'#4A4A4A',gradient:'radial-gradient(circle at 40% 35%,#6A6A6A,#3A3A3A,#202020)'}
  ]},
  {id:'hazel',arName:'عسلي مميز',natureBg:'https://images.unsplash.com/photo-1470770903676-69b98201ea1c?w=800&q=80',lenses:[
    {id:'hz1',name:'لوز',desc:'عسلي لوزي طبيعي',price:95,stock:32,color:'#C4A265',gradient:'radial-gradient(circle at 40% 35%,#D4B878,#C4A265,#8B7355)'},
    {id:'hz2',name:'نحاسي',desc:'عسلي نحاسي دافئ',price:100,stock:20,color:'#B87333',gradient:'radial-gradient(circle at 40% 35%,#D4944A,#B87333,#7B4A1E)'}
  ]},
  {id:'purple',arName:'بنفسجي ملكي',natureBg:'https://images.unsplash.com/photo-1490750967868-58cb75069ed6?w=800&q=80',lenses:[
    {id:'p1',name:'لافندر',desc:'بنفسجي لافندر رومانسي',price:110,stock:18,color:'#A88BC5',gradient:'radial-gradient(circle at 40% 35%,#C5A8DC,#A88BC5,#7B5EA7)'},
    {id:'p2',name:'أرجواني',desc:'بنفسجي غامق ملكي',price:120,stock:11,color:'#6B3FA0',gradient:'radial-gradient(circle at 40% 35%,#8B5FC0,#6B3FA0,#4B2A70)'}
  ]}
];

let products=[],cart=[],currentSlide=0;

function initProducts(){
  products=[];
  COLORS_DATA.forEach(c=>c.lenses.forEach(l=>products.push({...l,categoryId:c.id,categoryName:c.arName})));
}

function getProd(id){return products.find(p=>p.id===id)}

/* ========== RENDER CREATIVE CARDS ========== */
function renderSlider(){
  const track=document.getElementById('sliderTrack');
  const indicators=document.getElementById('indicators');
  
  track.innerHTML=COLORS_DATA.map((c,ci)=>{
    const totalStock=c.lenses.reduce((s,l)=>s+(getProd(l.id)?.stock||0),0);
    const minPrice=Math.min(...c.lenses.map(l=>getProd(l.id)?.price||0));
    const dots=c.lenses.map(l=>`<div class="color-dot" style="background:${l.gradient}" title="${l.name}"></div>`).join('');
    const mainLens=c.lenses[0];
    
    return `
      <div class="slider-card" data-index="${ci}" onclick="openLensModal(${ci})">
        <div class="card-bg-image" style="background-image:url('${c.natureBg}')"></div>
        <div class="card-shimmer"></div>
        <div class="card-content">
          <div class="card-visual">
            <div class="lens-container">
              <div class="lens-ring"></div>
              <div class="lens-sphere" style="background:${mainLens.gradient}"></div>
            </div>
            <div class="color-dots">${dots}</div>
          </div>
          <div class="card-info">
            <div class="card-category"><span class="dot"></span>${c.arName}</div>
            <h3 class="card-name">${mainLens.name}</h3>
            <p class="card-desc">${mainLens.desc}</p>
            <div class="card-stats">
              <div class="stat">
                <span class="stat-value">${c.lenses.length}</span>
                <span class="stat-label">تدرجات</span>
              </div>
              <div class="stat">
                <span class="stat-value">${totalStock}</span>
                <span class="stat-label">قطعة</span>
              </div>
            </div>
            <div class="card-footer">
              <div class="card-price">يبدأ من <strong>${minPrice} ر.س</strong></div>
              <button class="card-explore">اكتشفي ✦</button>
            </div>
          </div>
        </div>
      </div>
    `;
  }).join('');
  
  indicators.innerHTML=COLORS_DATA.map((_,i)=>`<div class="indicator ${i===0?'active':''}" onclick="goToSlide(${i})"></div>`).join('');
  
  // Animate cards entrance
  setTimeout(()=>{
    document.querySelectorAll('.slider-card').forEach((card,i)=>{
      setTimeout(()=>card.classList.add('revealed'),i*150);
    });
  },100);
  
  updateSlider();
}

function updateSlider(){
  const track=document.getElementById('sliderTrack');
  const cardWidth=380+32;
  track.style.transform=`translateX(-${currentSlide*cardWidth}px)`;
  
  document.querySelectorAll('.indicator').forEach((ind,i)=>ind.classList.toggle('active',i===currentSlide));
  document.getElementById('prevBtn').disabled=currentSlide===0;
  document.getElementById('nextBtn').disabled=currentSlide>=COLORS_DATA.length-1;
}

function slideMove(dir){
  const max=COLORS_DATA.length-1;
  currentSlide=Math.max(0,Math.min(max,currentSlide+dir));
  updateSlider();
}
function goToSlide(i){currentSlide=i;updateSlider();}

/* ========== CART FUNCTIONS ========== */
function updateCartBadge(){
  const total=cart.reduce((s,c)=>s+c.qty,0);
  const badge=document.getElementById('cartBadge');
  badge.textContent=total;
  badge.style.display=total>0?'flex':'none';
}

function openCart(){
  document.getElementById('cartOverlay').classList.add('open');
  document.getElementById('cartPanel').classList.add('open');
  renderCart();
}

function closeCart(){
  document.getElementById('cartOverlay').classList.remove('open');
  document.getElementById('cartPanel').classList.remove('open');
}

function renderCart(){
  const itemsDiv=document.getElementById('cartItems');
  const footerDiv=document.getElementById('cartFooter');
  
  if(cart.length===0){
    itemsDiv.innerHTML='<div style="text-align:center;padding:80px 20px;color:var(--text-dim)"><div style="font-size:64px;margin-bottom:16px;opacity:.3">👁️</div><p>السلة فارغة</p></div>';
    footerDiv.innerHTML='';
    return;
  }
  
  itemsDiv.innerHTML=cart.map(c=>{
    const p=getProd(c.productId);
    if(!p)return'';
    return `<div style="display:flex;gap:16px;padding:20px;border-bottom:1px solid rgba(201,168,76,.05);margin-bottom:12px">
      <div style="width:60px;height:60px;border-radius:50%;background:${p.gradient};box-shadow:0 4px 15px rgba(0,0,0,.3)"></div>
      <div style="flex:1">
        <div style="font-weight:600;margin-bottom:4px">${p.name}</div>
        <div style="font-size:11px;color:var(--text-dim);margin-bottom:8px">${p.categoryName}</div>
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span style="color:var(--gold);font-weight:700">${p.price*c.qty} ر.س</span>
          <div style="display:flex;align-items:center;gap:8px">
            <button onclick="changeQty('${c.productId}',-1)" style="width:28px;height:28px;border-radius:8px;background:rgba(201,168,76,.1);color:var(--gold)">−</button>
            <span>${c.qty}</span>
            <button onclick="changeQty('${c.productId}',1)" style="width:28px;height:28px;border-radius:8px;background:rgba(201,168,76,.1);color:var(--gold)">+</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
  
  const sub=cart.reduce((s,c)=>{const p=getProd(c.productId);return s+(p?p.price*c.qty:0)},0);
  const ship=sub>=200?0:15;
  const total=sub+ship;
  
  footerDiv.innerHTML=`
    <div style="margin-bottom:16px;font-size:14px;color:var(--text-dim);display:flex;justify-content:space-between"><span>المجموع</span><span>${sub} ر.س</span></div>
    <div style="margin-bottom:16px;font-size:14px;color:var(--text-dim);display:flex;justify-content:space-between"><span>الشحن</span><span>${ship===0?'مجاني':ship+' ر.س'}</span></div>
    <div style="font-size:24px;font-weight:700;color:var(--gold);display:flex;justify-content:space-between;margin-bottom:20px;padding-top:16px;border-top:1px solid rgba(201,168,76,.1)"><span>الإجمالي</span><span>${total} ر.س</span></div>
    <button onclick="checkout()" style="width:100%;padding:16px;border-radius:50px;background:linear-gradient(135deg,var(--gold),#b8943a);color:var(--bg);font-weight:700">إتمام الشراء 🧾</button>
  `;
}

function changeQty(pid,delta){
  const item=cart.find(c=>c.productId===pid);
  if(!item)return;
  item.qty+=delta;
  if(item.qty<=0){cart=cart.filter(c=>c.productId!==pid)}
  else{const p=getProd(pid);if(item.qty>p.stock)item.qty=p.stock}
  updateCartBadge();
  renderCart();
}

function addToCart(lensId,qty=1){
  const p=getProd(lensId);
  if(!p||p.stock<=0){showToast('⚠️ المنتج غير متوفر');return}
  
  const existing=cart.find(c=>c.productId===lensId);
  if(existing){
    if(existing.qty+qty>p.stock){showToast('⚠️ الكمية غير متاحة');return}
    existing.qty+=qty;
  }else{
    if(qty>p.stock){showToast('⚠️ الكمية غير متاحة');return}
    cart.push({productId:lensId,qty});
  }
  
  updateCartBadge();
  showToast(`✅ تمت إضافة "${p.name}" للسلة`);
}

function checkout(){
  if(cart.length===0)return;
  cart.forEach(c=>{const p=getProd(c.productId);if(p)p.stock=Math.max(0,p.stock-c.qty)});
  showToast('✅ تم الشراء بنجاح!');
  cart=[];
  updateCartBadge();
  closeCart();
  initProducts();
}

function showToast(msg){
  const toast=document.getElementById('toast');
  toast.textContent=msg;
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'),3000);
}

/* ========== MODAL FOR LENSES ========== */
function openLensModal(ci){
  const cat=COLORS_DATA[ci];
  const modal=document.createElement('div');
  modal.className='modal-bg open';
  modal.id='lensModal';
  modal.innerHTML=`
    <div class="modal-box" onclick="event.stopPropagation()">
      <div style="padding:24px;border-bottom:1px solid rgba(201,168,76,.1);display:flex;justify-content:space-between;align-items:center">
        <h2 style="font-family:'Playfair Display',serif;color:var(--gold);font-size:26px">${cat.arName}</h2>
        <button onclick="this.closest('.modal-bg').remove()" style="width:44px;height:44px;border-radius:50%;background:rgba(201,168,76,.1);color:var(--gold);font-size:20px">✕</button>
      </div>
      <div style="padding:32px">
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:24px">
          ${cat.lenses.map(l=>{
            const p=getProd(l.id);
            const stock=p.stock===0?'نفذ':p.stock<=5?`باقي ${p.stock}`:`متوفر`;
            const stockClass=p.stock===0?'out':p.stock<=5?'low':'';
            return `
              <div style="background:rgba(201,168,76,.05);border:1px solid rgba(201,168,76,.1);border-radius:20px;padding:24px;transition:all .3s">
                <div style="width:120px;height:120px;border-radius:50%;background:${l.gradient};margin:0 auto 16px;box-shadow:0 0 30px ${l.color}30"></div>
                <h3 style="font-family:'Playfair Display',serif;font-size:20px;margin-bottom:8px;text-align:center">${l.name}</h3>
                <p style="font-size:13px;color:var(--text-dim);text-align:center;margin-bottom:16px">${l.desc}</p>
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding:12px;background:rgba(201,168,76,.05);border-radius:12px">
                  <span style="color:var(--gold);font-weight:700;font-size:20px">${l.price} ر.س</span>
                  <span style="font-size:12px;color:${p.stock===0?'#e74c3c':p.stock<=5?'#ff9800':'var(--text-dim)'}">${stock}</span>
                </div>
                <div style="display:flex;gap:12px;align-items:center;margin-bottom:16px">
                  <span style="font-size:13px;color:var(--text-dim)">الكمية:</span>
                  <div style="display:flex;align-items:center;gap:8px;background:rgba(201,168,76,.08);border-radius:10px;padding:4px">
                    <button onclick="this.nextElementSibling.textContent=Math.max(1,parseInt(this.nextElementSibling.textContent)-1)" style="width:32px;height:32px;border-radius:8px;background:rgba(201,168,76,.1);color:var(--gold)">−</button>
                    <span style="width:32px;text-align:center;font-weight:700">1</span>
                    <button onclick="this.previousElementSibling.textContent=Math.min(${p.stock},parseInt(this.previousElementSibling.textContent)+1)" style="width:32px;height:32px;border-radius:8px;background:rgba(201,168,76,.1);color:var(--gold)">+</button>
                  </div>
                </div>
                <button onclick="addToCart('${l.id}',parseInt(this.previousElementSibling.querySelector('span').textContent));this.closest('.modal-bg').remove()" ${p.stock===0?'disabled':''} style="width:100%;padding:14px;border-radius:50px;background:${p.stock===0?'rgba(139,115,85,.3)':'linear-gradient(135deg,var(--gold),#b8943a)'};color:${p.stock===0?'var(--text-dim)':'var(--bg)'};font-weight:700;cursor:${p.stock===0?'not-allowed':'pointer'}">${p.stock===0?'غير متوفر':'أضيفي للسلة 🛒'}</button>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    </div>
  `;
  modal.onclick=()=>modal.remove();
  document.body.appendChild(modal);
}

/* ========== NAV SCROLL EFFECT ========== */
window.addEventListener('scroll',()=>{
  document.getElementById('mainNav').classList.toggle('scrolled',window.scrollY>60);
});

/* ========== TOUCH SWIPE ========== */
let touchStartX=0;
const track=document.getElementById('sliderTrack');
if(track){
  track.addEventListener('touchstart',e=>touchStartX=e.changedTouches[0].screenX);
  track.addEventListener('touchend',e=>{
    const diff=touchStartX-e.changedTouches[0].screenX;
    if(Math.abs(diff)>50)slideMove(diff>0?1:-1);
  });
}

/* ========== INIT ========== */
initProducts();
renderSlider();
updateCartBadge();
</script>
</body>
</html>
