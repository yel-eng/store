<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lensora — عدسات ملونة فاخرة</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5.1.0/index.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/playfair-display@5.1.0/index.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#0a0808;--card-bg:rgba(18,14,12,.72);--gold:#c9a84c;--gold-light:#e8d5a3;--text:#f5ede0;--text-dim:#8a7e73;--radius:24px;--radius-sm:14px;--preview-dark:#121010;--success:#2ecc71;--warning:#f39c12;--error:#e74c3c;--transition-fast:.25s cubic-bezier(.22,1,.36,1);--transition-normal:.6s cubic-bezier(.22,1,.36,1);--transition-slow:.9s cubic-bezier(.22,1,.36,1)}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;min-height:100vh;line-height:1.6}
button{cursor:pointer;border:none;font-family:inherit;background:none;color:inherit}
button:disabled{opacity:.5;cursor:not-allowed}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
.ambient{position:fixed;inset:0;pointer-events:none;z-index:0}
.ambient-orb{position:absolute;border-radius:50%;filter:blur(150px);opacity:.06}
.ambient-orb:nth-child(1){width:600px;height:600px;background:#c9a84c;top:-15%;right:-10%;animation:orb1 22s ease-in-out infinite}
@keyframes orb1{0%,100%{transform:translate(0,0)}33%{transform:translate(-100px,80px)}66%{transform:translate(60px,-50px)}}
.nav{position:fixed;top:0;left:0;right:0;z-index:1000;padding:18px 5%;display:flex;align-items:center;justify-content:space-between;background:rgba(6,4,4,.15);backdrop-filter:blur(20px);border-bottom:1px solid rgba(201,168,76,.04)}
.nav-logo{font-family:'Playfair Display',serif;font-size:24px;color:var(--gold);letter-spacing:4px;text-decoration:none}
.cart-btn{background:rgba(201,168,76,.06);color:var(--gold);padding:12px 22px;border-radius:50px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;border:1px solid rgba(201,168,76,.08);position:relative}
.cart-badge{background:#e74c3c;color:#fff;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;position:absolute;top:-6px;left:-6px}
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:120px 5% 80px}
.hero-title{font-family:'Playfair Display',serif;font-size:clamp(40px,7vw,68px);color:var(--gold);letter-spacing:8px;margin-bottom:20px}
.cta-primary{padding:16px 40px;border-radius:50px;background:linear-gradient(135deg,var(--gold),#b8943a);color:var(--bg);font-weight:700;font-size:15px;transition:all .3s}
.cta-primary:hover{transform:translateY(-3px);box-shadow:0 12px 35px rgba(201,168,76,.3)}
.slider-container{padding:80px 0;max-width:1200px;margin:0 auto}
.slider-viewport{overflow:hidden;padding:20px 0;-webkit-mask-image:linear-gradient(90deg,transparent 0%,black 8%,black 92%,transparent 100%);mask-image:linear-gradient(90deg,transparent 0%,black 8%,black 92%,transparent 100%)}
.slider-track{display:flex;gap:28px;will-change:transform;direction:ltr}
.slider-card{flex:0 0 340px;position:relative;border-radius:var(--radius);overflow:hidden;cursor:pointer;background:var(--card-bg);backdrop-filter:blur(24px);border:1px solid rgba(201,168,76,.06);transition:transform var(--transition-normal),box-shadow var(--transition-normal)}
.slider-card:hover{transform:translateY(-12px) scale(1.03);box-shadow:0 30px 80px rgba(0,0,0,.6),0 0 60px rgba(201,168,76,.12)}
.slider-card .card-bg{position:absolute;inset:0;z-index:0;transition:opacity var(--transition-normal),transform var(--transition-slow)}
.slider-card:hover .card-bg{opacity:.55;transform:scale(1.05)}
.slider-card::after{content:'';position:absolute;inset:0;z-index:1;background:linear-gradient(180deg,transparent 5%,rgba(18,14,12,.92) 75%);pointer-events:none}
.card-visual{position:relative;height:230px;z-index:4;display:flex;align-items:center;justify-content:center}
.card-lens-sphere{position:relative;z-index:5;width:140px;height:140px;border-radius:50%;display:flex;align-items:center;justify-content:center;animation:lensFloat 5s ease-in-out infinite}
@keyframes lensFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.slider-card:hover .card-lens-sphere{transform:scale(1.2) translateY(-8px);animation-play-state:paused;box-shadow:0 0 50px rgba(201,168,76,.2)}
.card-lens-inner{width:120px;height:120px;border-radius:50%;box-shadow:inset 0 0 30px rgba(0,0,0,.4)}
.card-dots{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:6}
.card-dot{width:22px;height:22px;border-radius:50%;border:2px solid rgba(255,255,255,.1)}
.card-body{position:relative;z-index:4;padding:24px 28px}
.card-badge{display:inline-flex;align-items:center;gap:5px;padding:5px 14px;border-radius:50px;background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.12);font-size:9px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:14px}
.card-badge .dot{width:5px;height:5px;border-radius:50%;background:var(--gold);animation:pulseDot 2s infinite}
@keyframes pulseDot{0%,100%{opacity:1}50%{opacity:.4}}
.card-name{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;margin-bottom:8px}
.slider-card:hover .card-name{color:var(--gold-light)}
.card-count{font-size:11px;color:var(--text-dim);margin-bottom:18px}
.card-footer{display:flex;justify-content:space-between;align-items:center;padding-top:16px;border-top:1px solid rgba(201,168,76,.06)}
.card-price{font-size:13px;color:var(--text-dim)}
.card-price strong{font-size:20px;color:var(--gold);font-weight:700}
.card-btn{padding:9px 22px;border-radius:50px;background:linear-gradient(135deg,var(--gold),#b8943a);color:var(--bg);font-weight:700;font-size:11px;letter-spacing:1px}
.card-btn:hover{transform:translateY(-2px);box-shadow:0 5px 20px rgba(201,168,76,.3)}
.slider-controls{display:flex;align-items:center;justify-content:center;gap:20px;margin-top:36px}
.slider-nav-btn{width:52px;height:52px;border-radius:50%;background:rgba(201,168,76,.06);backdrop-filter:blur(10px);border:1px solid rgba(201,168,76,.12);color:var(--gold);font-size:20px;display:flex;align-items:center;justify-content:center}
.slider-nav-btn:hover{background:var(--gold);color:var(--bg)}
.slider-dots{display:flex;gap:10px}
.slider-dot{width:12px;height:12px;border-radius:50%;background:rgba(201,168,76,.12);cursor:pointer;border:2px solid transparent}
.slider-dot.active{background:var(--gold);transform:scale(1.4);box-shadow:0 0 15px rgba(201,168,76,.5)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:2000;display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:all var(--transition-normal);padding:20px;backdrop-filter:blur(12px)}
.modal-bg.open{opacity:1;visibility:visible}
.modal-box{background:var(--preview-dark);backdrop-filter:blur(40px);border-radius:var(--radius);width:100%;max-width:1000px;max-height:92vh;overflow-y:auto;border:1px solid rgba(201,168,76,.06);transform:scale(.92) translateY(40px);transition:transform var(--transition-slow);box-shadow:0 40px 100px rgba(0,0,0,.6);position:relative}
.modal-bg.open .modal-box{transform:scale(1) translateY(0)}
.modal-header{padding:24px 36px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(201,168,76,.04);position:sticky;top:0;background:var(--preview-dark);z-index:2;backdrop-filter:blur(20px);border-radius:var(--radius) var(--radius) 0 0}
.modal-header h2{font-family:'Playfair Display',serif;font-size:26px;color:var(--gold)}
.modal-close{width:44px;height:44px;border-radius:50%;background:rgba(201,168,76,.06);color:var(--gold);display:flex;align-items:center;justify-content:center;font-size:20px}
.modal-close:hover{background:var(--gold);color:var(--bg);transform:rotate(90deg)}
.modal-nav-arrow{position:absolute;top:50%;transform:translateY(-50%);width:50px;height:50px;background:rgba(201,168,76,0.1);backdrop-filter:blur(5px);border:1px solid rgba(201,168,76,0.2);color:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;z-index:10}
.modal-nav-arrow:hover{background:var(--gold);color:var(--bg);transform:translateY(-50%) scale(1.1)}
.modal-nav-prev{right:20px}
.modal-nav-next{left:20px}
.slider-area{padding:40px 36px}
.lens-slider-container{position:relative;overflow:hidden;border-radius:var(--radius);padding:44px 36px;border:1px solid rgba(201,168,76,.04);background:rgba(201,168,76,.012)}
.lens-slider-track{display:flex;transition:transform var(--transition-slow) cubic-bezier(.22,1,.36,1)}
.lens-slide{min-width:100%;display:flex;gap:48px;align-items:center;padding:0 10px}
.lens-visual{width:260px;height:260px;border-radius:50%;position:relative;flex-shrink:0;display:flex;align-items:center;justify-content:center;animation:lensGlow 4s ease-in-out infinite}
@keyframes lensGlow{0%,100%{box-shadow:0 0 50px rgba(201,168,76,.06)}50%{box-shadow:0 0 100px rgba(201,168,76,.12)}}
.lens-visual-inner{width:220px;height:220px;border-radius:50%;position:relative;overflow:hidden;box-shadow:inset 0 0 50px rgba(0,0,0,.3)}
.lens-circle{width:100%;height:100%;border-radius:50%}
.color-label{position:absolute;bottom:-28px;left:50%;transform:translateX(-50%);font-size:10px;letter-spacing:2px;color:var(--text-dim);display:flex;align-items:center;gap:6px}
.color-label .dot-real{width:8px;height:8px;border-radius:50%;border:1px solid rgba(255,255,255,.15)}
.lens-details{flex:1}
.lens-details h3{font-family:'Playfair Display',serif;font-size:30px;color:var(--text);margin-bottom:12px}
.lens-desc{font-size:15px;color:var(--text-dim);line-height:1.9;margin-bottom:28px}
.lens-meta{display:flex;gap:18px;margin-bottom:28px;flex-wrap:wrap}
.meta-item{background:rgba(201,168,76,.03);padding:16px 24px;border-radius:var(--radius-sm);border:1px solid rgba(201,168,76,.04)}
.meta-item .label{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:2px}
.meta-item .value{font-size:24px;font-weight:700;color:var(--gold);margin-top:6px}
.meta-item .value.stock-low{color:#f39c12}
.meta-item .value.stock-out{color:#e74c3c}
.qty-selector{display:flex;align-items:center;gap:16px;margin-bottom:28px}
.qty-ctrl{display:flex;align-items:center;background:rgba(201,168,76,.04);border-radius:var(--radius-sm);border:1px solid rgba(201,168,76,.06);overflow:hidden}
.qty-ctrl button{width:46px;height:46px;background:rgba(201,168,76,.04);color:var(--gold);font-size:22px;display:flex;align-items:center;justify-content:center}
.qty-ctrl button:hover{background:var(--gold);color:var(--bg)}
.qty-ctrl .qty-display{width:56px;text-align:center;font-size:20px;font-weight:700;color:var(--text)}
.add-lens-btn{padding:18px 44px;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--gold),#b8943a);color:var(--bg);font-weight:700;font-size:15px;display:inline-flex;align-items:center;gap:10px;width:100%;justify-content:center}
.add-lens-btn:hover{transform:translateY(-3px);box-shadow:0 12px 35px rgba(201,168,76,.3)}
.add-lens-btn:disabled{background:var(--text-dim);opacity:.4}
.slider-nav-modal{display:flex;justify-content:center;align-items:center;gap:24px;margin-top:36px}
.slider-nav-modal button{width:52px;height:52px;border-radius:50%;background:rgba(201,168,76,.04);color:var(--gold);font-size:22px;border:1px solid rgba(201,168,76,.04)}
.slider-nav-modal button:hover{background:var(--gold);color:var(--bg)}
.slider-dots-modal{display:flex;align-items:center;gap:10px}
.slider-dot-modal{width:10px;height:10px;border-radius:50%;background:rgba(201,168,76,.1);cursor:pointer}
.slider-dot-modal.active{background:var(--gold);transform:scale(1.5);box-shadow:0 0 14px rgba(201,168,76,.5)}
.cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:3000;opacity:0;visibility:hidden;transition:all var(--transition-normal)}
.cart-overlay.open{opacity:1;visibility:visible}
.cart-panel{position:fixed;top:0;left:0;width:460px;max-width:100vw;height:100vh;background:rgba(10,8,8,.96);backdrop-filter:blur(40px);z-index:3001;transform:translateX(-100%);transition:transform var(--transition-slow);display:flex;flex-direction:column;border-left:1px solid rgba(201,168,76,.04)}
.cart-panel.open{transform:translateX(0)}
.cart-top{padding:28px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(201,168,76,.04)}
.cart-top h2{font-family:'Playfair Display',serif;font-size:24px;color:var(--gold)}
.cart-items-list{flex:1;overflow-y:auto;padding:20px 28px}
.ci{display:flex;gap:16px;padding:20px 0;border-bottom:1px solid rgba(201,168,76,.03)}
.ci-color{width:58px;height:58px;border-radius:50%;flex-shrink:0;border:2px solid rgba(255,255,255,.04);box-shadow:0 4px 18px rgba(0,0,0,.3)}
.ci-info{flex:1}
.ci-name{font-size:15px;font-weight:600;margin-bottom:4px}
.ci-cat{font-size:11px;color:var(--text-dim);margin-bottom:12px}
.ci-bottom{display:flex;justify-content:space-between;align-items:center}
.ci-price{font-size:18px;font-weight:700;color:var(--gold)}
.ci-qty{display:flex;align-items:center;gap:8px}
.ci-qty button{width:30px;height:30px;border-radius:8px;background:rgba(201,168,76,.04);color:var(--gold);font-size:16px;display:flex;align-items:center;justify-content:center}
.ci-qty button:hover{background:var(--gold);color:var(--bg)}
.ci-qty span{font-size:16px;font-weight:600;min-width:24px;text-align:center}
.ci-remove{background:none;color:rgba(231,76,60,.5);font-size:16px;padding:4px}
.ci-remove:hover{color:#e74c3c}
.cart-bottom{padding:32px;border-top:1px solid rgba(201,168,76,.04)}
.cb-row{display:flex;justify-content:space-between;margin-bottom:12px;font-size:14px;color:var(--text-dim)}
.cb-row.total{font-size:24px;font-weight:700;color:var(--gold);padding-top:16px;border-top:1px solid rgba(201,168,76,.06);margin-top:12px}
.checkout-btn{width:100%;padding:18px;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--gold),#b8943a);color:var(--bg);font-weight:700;font-size:15px;margin-top:18px}
.checkout-btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(201,168,76,.3)}
.checkout-btn:disabled{background:var(--text-dim);opacity:.4}
.checkout-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:4000;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(10px)}
.checkout-overlay.show{display:flex}
.checkout-modal{background:var(--card-bg);border:1px solid var(--gold);border-radius:var(--radius);width:100%;max-width:700px;max-height:90vh;overflow-y:auto;padding:25px}
.checkout-title{font-family:'Playfair Display',serif;color:var(--gold);font-size:22px;margin-bottom:20px;text-align:center}
.checkout-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px}
.checkout-group{display:flex;flex-direction:column;gap:5px}
.checkout-group label{font-size:11px;color:var(--text-dim)}
.checkout-group input,.checkout-group select,.checkout-group textarea{background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.1);border-radius:8px;padding:10px;color:var(--text);font-size:13px;font-family:inherit}
.checkout-group input:focus,.checkout-group select:focus,.checkout-group textarea:focus{outline:2px solid var(--gold);border-color:transparent}
.checkout-group.full{grid-column:1/-1}
.checkout-group textarea{min-height:70px;resize:vertical}
.checkout-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;padding-top:15px;border-top:1px solid rgba(255,255,255,.1)}
.checkout-btn-submit{padding:12px 24px;border-radius:8px;font-weight:600;cursor:pointer;border:none;background:var(--gold);color:var(--bg);font-size:14px}
.checkout-btn-submit:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(201,168,76,.3)}
.checkout-btn-cancel{padding:12px 24px;border-radius:8px;font-weight:600;cursor:pointer;border:none;background:rgba(255,255,255,.1);color:var(--text);font-size:14px}
.toast{position:fixed;bottom:36px;left:50%;transform:translateX(-50%) translateY(120px);background:rgba(14,12,12,.95);backdrop-filter:blur(20px);border:1px solid rgba(201,168,76,.12);color:var(--text);padding:18px 36px;border-radius:var(--radius-sm);font-size:14px;z-index:9999;transition:transform var(--transition-slow);display:flex;align-items:center;gap:12px;box-shadow:0 12px 50px rgba(0,0,0,.5)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success{border-color:var(--success)}
.toast.error{border-color:var(--error)}
.footer{text-align:center;padding:50px 5%;border-top:1px solid rgba(201,168,76,.03);color:var(--text-dim);font-size:13px;position:relative;z-index:2}
@media(max-width:768px){.lens-slide{flex-direction:column;text-align:center;gap:32px}.lens-visual{width:200px;height:200px}.lens-visual-inner{width:170px;height:170px}.lens-meta{justify-content:center}.qty-selector{justify-content:center}.slider-area{padding:24px 16px}.lens-slider-container{padding:28px 16px}.cart-panel{width:100%}.modal-box{max-height:95vh}.modal-header{padding:20px 20px}.lens-details h3{font-size:24px}.checkout-grid{grid-template-columns:1fr}.modal-nav-arrow{width:40px;height:40px;font-size:18px;right:10px;left:10px}}
</style>
</head>
<body>
<div class="ambient"><div class="ambient-orb"></div></div>
<nav class="nav" id="mainNav">
<a href="#" class="nav-logo">LENSORA</a>
<div class="nav-actions">
<select id="currencySelect" style="background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.12);color:var(--text);padding:8px 12px;border-radius:8px;font-size:12px">
<option value="SAR">ر.س</option><option value="USD">$</option><option value="AED">د.إ</option><option value="EGP">ج.م</option>
</select>
<button class="cart-btn" onclick="openCart()">🛒 <span class="cart-badge" id="cartBadge" style="display:none">0</span></button>
<a href="admin.html" style="color:var(--gold);text-decoration:none;font-size:13px;padding:12px 18px;border-radius:50px;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.2)">⚙️ الإدارة</a>
</div>
</nav>
<header class="hero">
<h1 class="hero-title">LENSORA</h1>
<p style="color:var(--text-dim);margin-bottom:40px">عدسات ملونة فاخرة تعكس جمالك الطبيعي</p>
<button class="cta-primary" onclick="document.getElementById('products').scrollIntoView({behavior:'smooth'})">تسوقي الآن</button>
</header>
<main id="products">
<div class="slider-container">
<div class="slider-viewport"><div class="slider-track" id="sliderTrack"></div></div>
<div class="slider-controls">
<button class="slider-nav-btn" id="prevBtn">→</button>
<div class="slider-dots" id="sliderDots"></div>
<button class="slider-nav-btn" id="nextBtn">←</button>
</div>
</div>
</main>
<div class="modal-bg" id="lensModal">
<div class="modal-box" id="modalBox">
<button class="modal-nav-arrow modal-nav-prev" onclick="slideLensMove(1)">←</button>
<button class="modal-nav-arrow modal-nav-next" onclick="slideLensMove(-1)">→</button>
<div class="modal-header"><h2 id="modalTitle"></h2><button class="modal-close" onclick="closeLensModal()">✕</button></div>
<div class="slider-area"><div class="lens-slider-container" id="lensContainer"><div class="lens-slider-track" id="lensTrack"></div></div>
<div class="slider-nav-modal"><button onclick="slideLensMove(-1)" id="lensPrevBtn">→</button><div class="slider-dots-modal" id="lensSliderDots"></div><button onclick="slideLensMove(1)" id="lensNextBtn">←</button></div></div></div></div>
<div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>
<div class="cart-panel" id="cartPanel">
<div class="cart-top"><h2>🛒 سلة المشتريات</h2><button class="modal-close" onclick="closeCart()">✕</button></div>
<div class="cart-items-list" id="cartItemsList"></div>
<div class="cart-bottom" id="cartBottom"></div>
</div>
<div class="checkout-overlay" id="checkoutOverlay">
<div class="checkout-modal">
<h3 class="checkout-title">📋 إتمام الطلب - بيانات التوصيل</h3>
<form id="checkoutForm" onsubmit="handleCheckout(event)">
<div class="checkout-grid">
<div class="checkout-group"><label>الاسم الكامل *</label><input type="text" id="cName" required placeholder="أدخلي اسمك الثلاثي"></div>
<div class="checkout-group"><label>رقم الهاتف *</label><input type="tel" id="cPhone" required placeholder="05xxxxxxxx"></div>
<div class="checkout-group"><label>رقم هاتف بديل (للتأكيد)</label><input type="tel" id="cPhone2" placeholder="05xxxxxxxx"></div>
<div class="checkout-group"><label>المدينة *</label><input type="text" id="cCity" required placeholder="مثال: الرياض"></div>
<div class="checkout-group"><label>الحي / المنطقة *</label><input type="text" id="cDistrict" required placeholder="مثال: العليا"></div>
<div class="checkout-group"><label>اسم الشارع</label><input type="text" id="cStreet" placeholder="اسم الشارع الرئيسي"></div>
<div class="checkout-group"><label>رقم العمارة</label><input type="text" id="cBuilding"></div>
<div class="checkout-group"><label>رقم الشقة / الدور</label><input type="text" id="cApartment"></div>
<div class="checkout-group full"><label>ملاحظات إضافية</label><textarea id="cNotes" rows="2"></textarea></div>
<div class="checkout-group"><label>طريقة الاستلام</label><select id="cDelivery"><option value="delivery">توصيل للمنزل</option><option value="pickup">استلام من الفرع</option></select></div>
</div>

<button type="submit" class="checkout-btn-submit">✅ تأكيد الطلب</button>
</div></form></div></div>
<div class="toast" id="toast"></div>
<footer class="footer"><p>© 2026 LENSORA — جميع الحقوق محفوظة ✨</p></footer>

<script>
const SUPABASE_URL = 'https://bdgnhmqmttiksuhoamil.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJkZ25obXFtdHRpa3N1aG9hbWlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5NjUwNTEsImV4cCI6MjA5NDU0MTA1MX0.X9-9HMqbXod2vyHRpd26MuBNTcqo4VERUwRI1o5lzMw';
const { createClient } = supabase;
const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const CONFIG = { i18n: { defaultCurrency: 'SAR', exchangeRates: { SAR: 1, USD: 0.27, AED: 0.99, EGP: 12.5 } }};
let state = { products: [], cart: JSON.parse(localStorage.getItem('lensora_cart')) || [], currentCurrency: 'SAR' };
let currentLensIdx = 0;

function adjColor(hex, amount) {
  hex = hex.replace('#','');
  const r = Math.max(0, Math.min(255, parseInt(hex.substring(0,2),16)+amount));
  const g = Math.max(0, Math.min(255, parseInt(hex.substring(2,4),16)+amount));
  const b = Math.max(0, Math.min(255, parseInt(hex.substring(4,6),16)+amount));
  return '#'+[r,g,b].map(c=>c.toString(16).padStart(2,'0')).join('');
}
function generateLensGradient(color) { return `radial-gradient(circle at 40% 35%,${color},${adjColor(color,-30)},${adjColor(color,-70)})`; }
function getPrice(product, currency = state.currentCurrency) { const rate = CONFIG.i18n.exchangeRates[currency] || 1; return Math.round(product.price * rate); }
function getCurrencySymbol(currency = state.currentCurrency) { return { SAR: 'ر.س', USD: '$', AED: 'د.إ', EGP: 'ج.م' }[currency] || currency; }
function getAvailableStock(product) { const real = product.stockReal || product.stock || 0; const reserved = product.stockReserved || 0; return Math.max(0, real - reserved); }
function showToast(msg, type = 'info') { const t = document.getElementById('toast'); t.textContent = msg; t.className = `toast ${type} show`; setTimeout(() => t.classList.remove('show'), 3000); }

async function loadData() {
  try {
    const { data: catsData } = await supabaseClient.from('categories').select('*');
    const { data: prodsData } = await supabaseClient.from('products').select('*').eq('visible', true);
    const catMap = {};
    if (catsData) catsData.forEach(c => { catMap[c.id] = { ar: c.ar || c.name_ar || 'عام', en: c.en || c.name_en || 'General', color: c.color || '#c9a84c' }; });
    if (prodsData && prodsData.length > 0) {
      state.products = prodsData.map(p => {
        const catId = p.category || p.category_id || 'uncategorized';
        const catInfo = catMap[catId] || { ar: 'عام', en: 'General', color: '#c9a84c' };
        return { ...p, id: p.id, nameAr: p.name_ar || p.name || 'منتج', nameEn: p.name_en || '', categoryId: catId, categoryName: catInfo.ar, categoryNameEn: catInfo.en, categoryColor: catInfo.color, gradient: p.gradient || generateLensGradient(p.color || catInfo.color), visible: p.visible !== false, price: parseFloat(p.price) || 0, stockReal: p.stock_real || p.stockReal || 0, stockReserved: p.stock_reserved || p.stockReserved || 0 };
      });
    } else {
      state.products = [
        {id:'p1', nameAr:'عسل ذهبي', nameEn:'Golden Honey', category:'brown', price:85, stockReal:50, stockReserved:0, color:'#D4A056', visible:true, categoryName:'بني دافئ', categoryNameEn:'Warm Brown', categoryColor:'#D4A056'},
        {id:'p2', nameAr:'شوكولاتة', nameEn:'Chocolate', category:'brown', price:85, stockReal:30, stockReserved:0, color:'#8B4513', visible:true, categoryName:'بني دافئ', categoryNameEn:'Warm Brown', categoryColor:'#D4A056'},
        {id:'p3', nameAr:'محيط', nameEn:'Ocean', category:'blue', price:90, stockReal:20, stockReserved:0, color:'#2E6CB5', visible:true, categoryName:'أزرق ساحر', categoryNameEn:'Enchanting Blue', categoryColor:'#2E6CB5'},
        {id:'p4', nameAr:'زمردي', nameEn:'Emerald', category:'green', price:95, stockReal:15, stockReserved:0, color:'#2E8B57', visible:true, categoryName:'أخضر زمردي', categoryNameEn:'Emerald Green', categoryColor:'#2E8B57'}
      ].map(p => ({...p, gradient: generateLensGradient(p.color)}));
    }
  } catch (e) { console.error('Load error', e); }
}

function initSmoothSlider() {
  const track = document.getElementById('sliderTrack'); if (!track) return;
  const visibleProducts = state.products.filter(p => p.visible !== false);
  const GAP = 28, CARD_W = 340, ITEM_W = CARD_W + GAP;
  const grouped = {};
  visibleProducts.forEach(p => {
    const catId = p.categoryId;
    if (!grouped[catId]) grouped[catId] = { id: catId, arName: p.categoryName, enName: p.categoryNameEn, color: p.categoryColor || '#c9a84c', cardBg: `linear-gradient(135deg,${adjColor(p.categoryColor||'#c9a84c',-60)} 0%,${p.categoryColor||'#c9a84c'} 50%,${adjColor(p.categoryColor||'#c9a84c',30)} 100%)`, lenses: [] };
    grouped[catId].lenses.push(p);
  });
  const COLORS_DATA = Object.values(grouped); const total = COLORS_DATA.length;
  if (total === 0) { track.innerHTML = '<div style="color:white;text-align:center;width:100%;padding:40px">لا توجد منتجات</div>'; return; }
  let html = '';
  for (let copy = 0; copy < 3; copy++) {
    COLORS_DATA.forEach((cat, i) => {
      if (!cat.lenses.length) return;
      const main = cat.lenses[0]; const totalStock = cat.lenses.reduce((s,l) => s + getAvailableStock(l), 0);
      const dots = cat.lenses.map(l => `<div class="card-dot" style="background:${l.gradient}"></div>`).join('');
      html += `<div class="slider-card" data-cat="${i}"><div class="card-bg" style="background:${cat.cardBg}"></div><div class="card-visual"><div class="card-lens-sphere"><div class="card-lens-inner" style="background:${main.gradient}"></div></div><div class="card-dots">${dots}</div></div><div class="card-body"><div class="card-badge"><span class="dot"></span>${cat.arName}</div><div class="card-name">مجموعة ${cat.arName}</div><div class="card-count">${cat.lenses.length} لون متاح · المتاح: ${totalStock}</div><div class="card-footer"><div class="card-price">يبدأ من <strong>${getPrice(main)} ${getCurrencySymbol()}</strong></div><button class="card-btn" onclick="event.stopPropagation();openLensModal(${i})"><span>اكتشفي ✦</span></button></div></div></div>`;
    });
  }
  track.innerHTML = html;
  document.getElementById('sliderDots').innerHTML = COLORS_DATA.map((_, i) => `<div class="slider-dot" data-idx="${i}"></div>`).join('');
  let activeCatIdx = 0, currentPos = 0, isDragging = false, dragStartX = 0, dragStartPos = 0, animFrame = null, isAnimating = false, autoplayInterval = null;
  function getCenterOffset() { const vp = document.querySelector('.slider-viewport'); return vp ? (vp.offsetWidth - CARD_W) / 2 : 0; }
  
  // ✅ FIXED: Corrected modulo operator from % normalized to % total
  function updateDots(idx) {
    const normalized = ((idx % total) + total) % total;
    document.querySelectorAll('#sliderDots .slider-dot').forEach((d, i) => d.classList.toggle('active', i === normalized));
  }

  function snapToIndex(idx) {
    isAnimating = true; const normalized = ((idx % total) + total) % total; activeCatIdx = normalized;
    const target = idx * ITEM_W; const centerOffset = getCenterOffset(); const pos = target - centerOffset;
    cancelAnimationFrame(animFrame);
    const start = currentPos, diff = pos - start, startTime = performance.now();
    function easeOutQuart(t) { return 1 - Math.pow(1 - t, 4); }
    function step(now) {
      const elapsed = now - startTime, progress = Math.min(elapsed / 850, 1); const ease = easeOutQuart(progress);
      currentPos = start + diff * ease; track.style.transform = `translateX(-${currentPos}px)`;
      if (progress < 1) animFrame = requestAnimationFrame(step); else { isAnimating = false; if (idx >= total * 2 || idx < 0) { const resetIdx = normalized + (idx >= total * 2 ? total : 0); const resetPos = resetIdx * ITEM_W - centerOffset; track.style.transition = 'none'; track.style.transform = `translateX(-${resetPos}px)`; void track.offsetWidth; track.style.transition = ''; } }
    }
    animFrame = requestAnimationFrame(step);
    updateDots(normalized);
  }
  const startCopy = 1; currentPos = (startCopy * total) * ITEM_W - getCenterOffset(); track.style.transform = `translateX(-${currentPos}px)`;
  updateDots(0);
  autoplayInterval = setInterval(() => { if (!isDragging && !isAnimating) { activeCatIdx++; snapToIndex(activeCatIdx); } }, 5000);
  function resetAutoplay() { clearInterval(autoplayInterval); autoplayInterval = setInterval(() => { if (!isDragging && !isAnimating) { activeCatIdx++; snapToIndex(activeCatIdx); } }, 5000); }
  document.getElementById('prevBtn').onclick = () => { activeCatIdx--; snapToIndex(activeCatIdx); resetAutoplay(); };
  document.getElementById('nextBtn').onclick = () => { activeCatIdx++; snapToIndex(activeCatIdx); resetAutoplay(); };
  document.getElementById('sliderDots').onclick = (e) => { const dot = e.target.closest('.slider-dot'); if (!dot) return; const idx = parseInt(dot.dataset.idx); activeCatIdx = idx; snapToIndex(startCopy * total + idx); resetAutoplay(); };
  track.onclick = (e) => { const card = e.target.closest('.slider-card'); if (!card || isDragging) return; const catIdx = parseInt(card.dataset.cat); if (!isNaN(catIdx)) openLensModal(catIdx); };
  const startDrag = (x) => { isDragging = true; dragStartX = x; dragStartPos = currentPos; cancelAnimationFrame(animFrame); isAnimating = false; track.style.transition = 'none'; };
  const moveDrag = (x) => { if (!isDragging) return; currentPos = dragStartPos - ((x - dragStartX) * 0.85); track.style.transform = `translateX(-${currentPos}px)`; };
  const endDrag = () => { if (!isDragging) return; isDragging = false; const centerOffset = getCenterOffset(); const rawIdx = (currentPos + centerOffset) / ITEM_W; let targetIdx = Math.round(rawIdx); if (Math.abs(currentPos - dragStartPos) > CARD_W * 0.3) targetIdx = currentPos < dragStartPos ? Math.ceil(rawIdx) : Math.floor(rawIdx); activeCatIdx = ((targetIdx % total) + total) % total; snapToIndex(targetIdx); resetAutoplay(); };
  track.addEventListener('touchstart', e => startDrag(e.touches[0].clientX), {passive:true}); track.addEventListener('touchmove', e => moveDrag(e.touches[0].clientX), {passive:true}); track.addEventListener('touchend', endDrag);
  track.addEventListener('mousedown', e => { e.preventDefault(); startDrag(e.clientX); }); document.addEventListener('mousemove', e => moveDrag(e.clientX)); document.addEventListener('mouseup', endDrag);
}

function openLensModal(ci) {
  currentLensIdx = 0;
  const visibleProducts = state.products.filter(p => p.visible !== false);
  const grouped = {}; visibleProducts.forEach(p => { if (!grouped[p.categoryId]) grouped[p.categoryId] = []; grouped[p.categoryId].push(p); });
  const catIds = Object.keys(grouped); const targetCatId = catIds[ci % catIds.length]; const catProducts = grouped[targetCatId] || visibleProducts;
  if (!catProducts.length) return;
  document.getElementById('modalTitle').textContent = `مجموعة ${catProducts[0].categoryName}`;
  document.getElementById('lensTrack').innerHTML = catProducts.map((p, li) => {
    const available = getAvailableStock(p); const sc = available === 0 ? 'stock-out' : available <= 5 ? 'stock-low' : ''; const st = available === 0 ? 'نفذ' : available <= 5 ? `باقي ${available}` : `${available} قطعة`;
    return `<div class="lens-slide"><div class="lens-visual"><div class="lens-visual-inner"><div class="lens-circle" style="background:${p.gradient}"></div></div><div class="color-label"><span class="dot-real" style="background:${p.color}"></span>اللون الفعلي</div></div><div class="lens-details"><h3>${p.nameAr}</h3><p class="lens-desc">${p.description||'عدسة فاخرة بجودة عالية'}</p><div class="lens-meta"><div class="meta-item"><div class="label">السعر</div><div class="value">${getPrice(p)} ${getCurrencySymbol()}</div></div><div class="meta-item"><div class="label">المتاح</div><div class="value ${sc}">${st}</div></div></div><div class="qty-selector"><label>الكمية:</label><div class="qty-ctrl"><button onclick="changeModalQty(-1,${li})">−</button><div class="qty-display" id="mq_${li}">1</div><button onclick="changeModalQty(1,${li})">+</button></div></div><button class="add-lens-btn" onclick="addFromSlider('${p.id}',${li})" ${available===0?'disabled':''}><span>${available===0?'غير متوفر':'🛒 أضف للسلة'}</span></button></div></div>`;
  }).join('');
  document.getElementById('lensSliderDots').innerHTML = catProducts.map((_, li) => `<div class="slider-dot-modal ${li===0?'active':''}" onclick="goToLensSlide(${li})"></div>`).join('');
  updateLensSlider();
  document.getElementById('lensModal').classList.add('open'); document.body.style.overflow = 'hidden';
}
function closeLensModal() { document.getElementById('lensModal').classList.remove('open'); document.body.style.overflow = ''; }
function updateLensSlider() { document.getElementById('lensTrack').style.transform = `translateX(${currentLensIdx * 100}%)`; document.querySelectorAll('.slider-dot-modal').forEach((d, i) => d.classList.toggle('active', i === currentLensIdx)); document.getElementById('lensPrevBtn').disabled = currentLensIdx === 0; document.getElementById('lensNextBtn').disabled = currentLensIdx >= (document.getElementById('lensTrack').children.length - 1); }
function slideLensMove(dir) { const total = document.getElementById('lensTrack').children.length; currentLensIdx = Math.max(0, Math.min(total - 1, currentLensIdx + dir)); document.getElementById('lensTrack').style.transition = 'transform 0.85s cubic-bezier(.22,1,.36,1)'; updateLensSlider(); setTimeout(() => { document.getElementById('lensTrack').style.transition = ''; }, 900); }
function goToLensSlide(i) { currentLensIdx = i; updateLensSlider(); }
function changeModalQty(delta, li) { const el = document.getElementById(`mq_${li}`); if (!el) return; let v = parseInt(el.textContent) + delta; v = Math.max(1, Math.min(v, 10)); el.textContent = v; }
function addFromSlider(lensId, li) {
  const p = state.products.find(x => x.id === lensId); const available = getAvailableStock(p);
  if (!p || available <= 0) { showToast('⚠️ المنتج غير متاح', 'error'); return; }
  const el = document.getElementById(`mq_${li}`); const qty = el ? parseInt(el.textContent) : 1;
  if (available < qty) { showToast(`⚠️ الكمية المتاحة فقط: ${available}`, 'warning'); return; }
  const existing = state.cart.find(c => c.productId === lensId);
  if (existing) { if (available < existing.qty + qty) { showToast('⚠️ الكمية تتجاوز المتاح', 'warning'); return; } existing.qty += qty; } else { state.cart.push({ productId: lensId, qty }); }
  localStorage.setItem('lensora_cart', JSON.stringify(state.cart)); updateCartBadge(); showToast(`✅ "${p.nameAr}" أضيف للسلة`, 'success'); if (el) el.textContent = '1';
}

function updateCartBadge() { const total = state.cart.reduce((s, c) => s + c.qty, 0); const badge = document.getElementById('cartBadge'); badge.textContent = total; badge.style.display = total > 0 ? 'flex' : 'none'; }
function openCart() { renderCart(); document.getElementById('cartOverlay').classList.add('open'); document.getElementById('cartPanel').classList.add('open'); }
function closeCart() { document.getElementById('cartOverlay').classList.remove('open'); document.getElementById('cartPanel').classList.remove('open'); }
function renderCart() {
  const list = document.getElementById('cartItemsList'), bottom = document.getElementById('cartBottom');
  if (state.cart.length === 0) { list.innerHTML = '<div style="text-align:center;padding:80px 20px;color:var(--text-dim)"><p>السلة فارغة</p></div>'; bottom.innerHTML = ''; return; }
  list.innerHTML = state.cart.map(c => { const p = state.products.find(x => x.id === c.productId); if (!p) return ''; return `<div class="ci"><div class="ci-color" style="background:${p.gradient}"></div><div class="ci-info"><div class="ci-name">${p.nameAr}</div><div class="ci-cat">${p.categoryName||''}</div><div class="ci-bottom"><span class="ci-price">${getPrice(p) * c.qty} ${getCurrencySymbol()}</span><div class="ci-qty"><button onclick="changeCartQty('${c.productId}',-1)">−</button><span>${c.qty}</span><button onclick="changeCartQty('${c.productId}',1)">+</button></div></div></div><button class="ci-remove" onclick="removeFromCart('${c.productId}')">🗑</button></div>`; }).join('');
  const sub = state.cart.reduce((s, c) => { const p = state.products.find(x => x.id === c.productId); return s + (p ? getPrice(p) * c.qty : 0); }, 0); const shipping = sub >= 200 ? 0 : 15, total = sub + shipping;
  bottom.innerHTML = `<div class="cb-row"><span>المجموع</span><span>${sub} ${getCurrencySymbol()}</span></div><div class="cb-row"><span>الشحن ${shipping===0?'(مجاني)':''}</span><span>${shipping===0?'مجاني':shipping+' '+getCurrencySymbol()}</span></div><div class="cb-row total"><span>الإجمالي</span><span>${total} ${getCurrencySymbol()}</span></div><button class="checkout-btn" onclick="openCheckoutModal()">🧾 إتمام الشراء</button>`;
}
function changeCartQty(pid, delta) { const item = state.cart.find(c => c.productId === pid); if (!item) return; item.qty += delta; if (item.qty <= 0) { state.cart = state.cart.filter(c => c.productId !== pid); } localStorage.setItem('lensora_cart', JSON.stringify(state.cart)); updateCartBadge(); renderCart(); }
function removeFromCart(pid) { state.cart = state.cart.filter(c => c.productId !== pid); localStorage.setItem('lensora_cart', JSON.stringify(state.cart)); updateCartBadge(); renderCart(); showToast('✅ تمت الإزالة', 'success'); }

function openCheckoutModal() { if (state.cart.length === 0) return; closeCart(); document.getElementById('checkoutOverlay').classList.add('show'); }
function closeCheckoutModal() { document.getElementById('checkoutOverlay').classList.remove('show'); }

async function handleCheckout(e) {
  e.preventDefault();
  const btn = e.target.querySelector('.checkout-btn-submit'); const originalText = btn.innerHTML; btn.disabled = true; btn.innerHTML = '⏳ جاري المعالجة...';
  try {
    const totalAmount = state.cart.reduce((s, c) => { const p = state.products.find(x => x.id === c.productId); return s + (p ? getPrice(p) * c.qty : 0); }, 0);
    const invoiceData = {
      id: 'INV-' + Date.now().toString(36).toUpperCase().slice(-6) + '-' + Math.random().toString(36).substr(2,4).toUpperCase(),
      created_at: new Date().toISOString(),
      customer_name: document.getElementById('cName').value.trim(),
      customer_phone: document.getElementById('cPhone').value.trim(),
      customer_phone_secondary: document.getElementById('cPhone2').value.trim() || null,
      customer_city: document.getElementById('cCity').value.trim() || null,
      customer_district: document.getElementById('cDistrict').value.trim() || null,
      customer_street: document.getElementById('cStreet').value.trim() || null,
      customer_building: document.getElementById('cBuilding').value.trim() || null,
      customer_apartment: document.getElementById('cApartment').value.trim() || null,
      customer_notes: document.getElementById('cNotes').value.trim() || null,
      delivery_method: document.getElementById('cDelivery').value,
      items: state.cart.map(c => ({ productId: c.productId, qty: c.qty, name: (state.products.find(x=>x.id===c.productId)||{}).nameAr })),
      total: totalAmount, currency: state.currentCurrency, status: 'pending'
    };
    const { error } = await supabaseClient.from('invoices').insert([invoiceData]);
    if (error) throw error;
    for (const c of state.cart) {
      const p = state.products.find(x => x.id === c.productId);
      if (p) {
        const newReal = Math.max(0, (p.stockReal || 0) - c.qty);
        const newReserved = Math.max(0, (p.stockReserved || 0) - c.qty);
        await supabaseClient.from('products').update({ stock_real: newReal, stock_reserved: newReserved }).eq('id', c.productId);
      }
    }
    showToast('✅ تم إرسال طلبك بنجاح! 🎉', 'success');
    state.cart = []; localStorage.setItem('lensora_cart', JSON.stringify([])); updateCartBadge(); closeCheckoutModal(); e.target.reset();
    await loadData(); initSmoothSlider();
  } catch (err) { console.error(err); showToast('❌ حدث خطأ أثناء الحفظ', 'error'); } finally { btn.disabled = false; btn.innerHTML = originalText; }
}

document.getElementById('currencySelect').onchange = function() { state.currentCurrency = this.value; initSmoothSlider(); renderCart(); };
document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeLensModal(); closeCart(); closeCheckoutModal(); } });
document.addEventListener('DOMContentLoaded', async () => { await loadData(); initSmoothSlider(); updateCartBadge(); });
</script>
