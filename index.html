<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lensora — عالم العدسات الملونة</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5.1.0/index.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/playfair-display@5.1.0/index.min.css">
<style>
:root{
  --bg:#060404;
  --card-bg:rgba(18,14,12,.65);
  --gold:#c9a84c;
  --gold-light:#e8d5a3;
  --gold-dim:rgba(201,168,76,.15);
  --text:#f5ede0;
  --text-dim:#6b6058;
  --radius:24px;
  --radius-sm:14px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;min-height:100vh}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px}
button{cursor:pointer;border:none;font-family:inherit}

/* AMBIENT BG */
.ambient{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.ambient-orb{position:absolute;border-radius:50%;filter:blur(140px);opacity:.07}
.ambient-orb:nth-child(1){width:600px;height:600px;background:#c9a84c;top:-15%;right:-10%;animation:orb1 22s ease-in-out infinite}
.ambient-orb:nth-child(2){width:500px;height:500px;background:#4A90D9;bottom:-10%;left:-8%;animation:orb2 28s ease-in-out infinite}
.ambient-orb:nth-child(3){width:350px;height:350px;background:#7B5EA7;top:45%;left:40%;animation:orb3 18s ease-in-out infinite}
@keyframes orb1{0%,100%{transform:translate(0,0)}33%{transform:translate(-100px,80px)}66%{transform:translate(60px,-50px)}}
@keyframes orb2{0%,100%{transform:translate(0,0)}33%{transform:translate(80px,-70px)}66%{transform:translate(-60px,40px)}}
@keyframes orb3{0%,100%{transform:translate(-50%,-50%)}33%{transform:translate(calc(-50% + 80px),calc(-50% - 50px))}66%{transform:translate(calc(-50% - 50px),calc(-50% + 80px))}}

#particlesCanvas{position:fixed;inset:0;pointer-events:none;z-index:1;opacity:.35}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:1000;padding:18px 5%;display:flex;align-items:center;justify-content:space-between;background:rgba(6,4,4,.2);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(201,168,76,.04);transition:all .4s}
.nav.scrolled{background:rgba(6,4,4,.85);padding:12px 5%;border-bottom-color:rgba(201,168,76,.08)}
.nav-logo{font-family:'Playfair Display',serif;font-size:24px;color:var(--gold);letter-spacing:4px;display:flex;align-items:center;gap:12px}
.nav-logo svg{width:32px;height:32px;animation:logoSpin 20s linear infinite}
@keyframes logoSpin{to{transform:rotate(360deg)}}
.nav-logo span{font-size:10px;letter-spacing:3px;color:var(--text-dim);font-family:'Inter',sans-serif;display:block;font-weight:400}
.nav-actions{display:flex;gap:12px;align-items:center}
.cart-btn{background:rgba(201,168,76,.06);color:var(--gold);padding:12px 22px;border-radius:50px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;border:1px solid rgba(201,168,76,.08);transition:all .3s;position:relative;backdrop-filter:blur(10px)}
.cart-btn:hover{background:var(--gold);color:var(--bg);box-shadow:0 0 30px rgba(201,168,76,.2)}
.cart-badge{background:#e74c3c;color:#fff;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;position:absolute;top:-6px;left:-6px;animation:popBadge .4s cubic-bezier(.68,-.55,.27,1.55)}
@keyframes popBadge{from{transform:scale(0)}to{transform:scale(1)}}

/* HERO */
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;position:relative;overflow:hidden;padding:120px 5% 80px}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 30%,rgba(201,168,76,.05) 0%,transparent 70%),radial-gradient(ellipse 35% 35% at 15% 85%,rgba(74,144,217,.04) 0%,transparent 50%),radial-gradient(ellipse 35% 35% at 85% 85%,rgba(123,94,167,.04) 0%,transparent 50%)}

/* ✨ HERO SPHERE */
.hero-sphere-wrap{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:500px;height:500px;pointer-events:none;z-index:1}
.hero-sphere{
  position:absolute;inset:0;border-radius:50%;
  background:radial-gradient(circle at 30% 25%,rgba(201,168,76,.15),transparent 60%),
             radial-gradient(circle at 70% 75%,rgba(201,168,76,.08),transparent 50%);
  box-shadow:0 0 80px rgba(201,168,76,.12),inset 0 0 60px rgba(201,168,76,.05);
  animation:sphereFloat 8s ease-in-out infinite, sphereGlow 4s ease-in-out infinite;
  filter:blur(1px);
}
.hero-sphere::before{
  content:'';position:absolute;inset:20%;border-radius:50%;
  border:1px solid rgba(201,168,76,.2);
  animation:sphereRing 10s linear infinite;
}
.hero-sphere::after{
  content:'';position:absolute;inset:35%;border-radius:50%;
  border:1px solid rgba(201,168,76,.1);
  animation:sphereRing 15s linear infinite reverse;
}
@keyframes sphereFloat{0%,100%{transform:translate(-50%,-50%) translateY(0) scale(1)}50%{transform:translate(-50%,-50%) translateY(-20px) scale(1.02)}}
@keyframes sphereGlow{0%,100%{box-shadow:0 0 80px rgba(201,168,76,.12),inset 0 0 60px rgba(201,168,76,.05)}50%{box-shadow:0 0 120px rgba(201,168,76,.25),inset 0 0 80px rgba(201,168,76,.1)}}
@keyframes sphereRing{to{transform:rotate(360deg)}}

.sphere-particles{position:absolute;inset:-50px}
.sphere-particle{
  position:absolute;width:4px;height:4px;border-radius:50%;
  background:var(--gold);opacity:.6;
  animation:particleFloat 6s ease-in-out infinite;
  box-shadow:0 0 10px var(--gold);
}
.sphere-particle:nth-child(1){top:10%;left:20%;animation-delay:0s}
.sphere-particle:nth-child(2){top:30%;right:15%;animation-delay:1s}
.sphere-particle:nth-child(3){bottom:25%;left:10%;animation-delay:2s}
.sphere-particle:nth-child(4){bottom:40%;right:25%;animation-delay:0.5s}
.sphere-particle:nth-child(5){top:50%;left:5%;animation-delay:1.5s}
.sphere-particle:nth-child(6){top:15%;right:30%;animation-delay:2.5s}
@keyframes particleFloat{0%,100%{transform:translateY(0) scale(1);opacity:.6}50%{transform:translateY(-30px) scale(1.3);opacity:1}}

.hero-glass{position:relative;z-index:2;background:rgba(201,168,76,.02);backdrop-filter:blur(50px);-webkit-backdrop-filter:blur(50px);border:1px solid rgba(201,168,76,.08);border-radius:36px;padding:70px 90px;max-width:820px;animation:heroIn 1.4s cubic-bezier(.22,1,.36,1) both;box-shadow:0 0 100px rgba(201,168,76,.03),inset 0 1px 0 rgba(255,255,255,.02)}
@keyframes heroIn{from{opacity:0;transform:translateY(50px) scale(.94);filter:blur(12px)}to{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}}
.hero-glass::before{content:'';position:absolute;inset:-1px;border-radius:37px;background:linear-gradient(135deg,rgba(201,168,76,.15) 0%,transparent 40%,transparent 60%,rgba(201,168,76,.08) 100%);z-index:-1}
.hero-glass::after{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:conic-gradient(from 0deg,transparent,rgba(201,168,76,.04),transparent,transparent);animation:shimmerRotate 10s linear infinite;z-index:-1}
@keyframes shimmerRotate{to{transform:rotate(360deg)}}
.hero-logo-wrap{margin-bottom:28px;animation:logoAnim 1.2s cubic-bezier(.22,1,.36,1) .4s both}
@keyframes logoAnim{from{opacity:0;transform:scale(.7) rotateY(30deg)}to{opacity:1;transform:scale(1) rotateY(0)}}
.hero-logo-wrap svg{width:110px;height:110px;filter:drop-shadow(0 0 40px rgba(201,168,76,.25))}
.hero-title{font-family:'Playfair Display',serif;font-size:clamp(40px,7vw,68px);color:var(--gold);letter-spacing:8px;margin-bottom:10px;animation:titleAnim 1.2s cubic-bezier(.22,1,.36,1) .6s both}
@keyframes titleAnim{from{opacity:0;transform:translateY(25px);letter-spacing:24px}to{opacity:1;transform:translateY(0);letter-spacing:8px}}
.hero-line{width:70px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:0 auto 28px;animation:lineGrow 1.2s ease .7s both}
@keyframes lineGrow{from{width:0;opacity:0}to{width:70px;opacity:1}}
.hero-sub{font-size:15px;color:var(--text-dim);max-width:500px;margin:0 auto;line-height:1.9;animation:fadeUp .9s ease .8s both}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.hero-scroll{position:absolute;bottom:36px;left:50%;transform:translateX(-50%);z-index:2;display:flex;flex-direction:column;align-items:center;gap:10px;animation:fadeUp 1s ease 1.3s both}
.hero-scroll span{font-size:10px;letter-spacing:3px;color:var(--text-dim);text-transform:uppercase}
.scroll-line{width:1px;height:45px;background:linear-gradient(180deg,var(--gold),transparent);animation:scrollPulse 2.5s ease-in-out infinite}
@keyframes scrollPulse{0%,100%{opacity:.2;transform:scaleY(.4);transform-origin:top}50%{opacity:1;transform:scaleY(1)}}

/* ========== CATEGORIES SECTION - SLIDER VERSION ========== */
.categories-section{padding:60px 5% 120px;max-width:1400px;margin:0 auto;position:relative;z-index:2}
.section-header{text-align:center;margin-bottom:50px}
.section-label{display:inline-flex;align-items:center;gap:10px;font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:16px}
.section-label::before,.section-label::after{content:'';width:40px;height:1px}
.section-label::before{background:linear-gradient(270deg,var(--gold),transparent)}
.section-label::after{background:linear-gradient(90deg,var(--gold),transparent)}
.section-title{font-family:'Playfair Display',serif;font-size:clamp(30px,4vw,44px);margin-bottom:12px}
.section-sub{color:var(--text-dim);font-size:14px}

/* ✨ CREATIVE SLIDER CONTAINER */
.slider-wrapper{position:relative;overflow:visible;padding:40px 0}
.slider-track{
  display:flex;gap:24px;transition:transform .6s cubic-bezier(.22,1,.36,1);
  padding:20px 40px;scroll-snap-type:x mandatory;scroll-behavior:smooth;
  cursor:grab;
}
.slider-track:active{cursor:grabbing}
.slider-track::-webkit-scrollbar{display:none}

/* ✨ SLIDER CARD */
.slider-card{
  flex:0 0 340px;scroll-snap-align:center;
  position:relative;border-radius:var(--radius);overflow:hidden;
  cursor:pointer;transform-style:preserve-3d;
  transition:transform .5s cubic-bezier(.22,1,.36,1),box-shadow .4s ease;
  background:var(--card-bg);backdrop-filter:blur(24px);
  border:1px solid rgba(201,168,76,.08);
}
.slider-card:hover{transform:translateY(-12px) scale(1.03);z-index:10;box-shadow:0 30px 80px rgba(0,0,0,.6),0 0 60px rgba(201,168,76,.15)}

/* Nature Background for Slider Card - FIXED & CLEAR */
.slider-card::before{
  content:'';position:absolute;inset:0;z-index:0;
  background-size:cover;background-position:center;background-repeat:no-repeat;
  opacity:.45;transition:opacity .4s,transform .6s ease;
  filter:blur(0.5px) brightness(.9);
}
.slider-card:hover::before{opacity:.55;transform:scale(1.05)}

/* Gradient Overlay */
.slider-card::after{
  content:'';position:absolute;inset:0;z-index:1;
  background:linear-gradient(180deg,transparent 20%,rgba(18,14,12,.92) 85%),
             linear-gradient(90deg,rgba(18,14,12,.2) 0%,transparent 30%,transparent 70%,rgba(18,14,12,.2) 100%);
  pointer-events:none;
}

/* Animated Border */
.slider-card .card-border{
  position:absolute;inset:-2px;border-radius:calc(var(--radius) + 2px);
  background:conic-gradient(from var(--angle,0deg),transparent,rgba(201,168,76,.4),transparent 30%,transparent 70%,rgba(201,168,76,.3),transparent);
  z-index:2;opacity:0;transition:opacity .4s;animation:borderSpin 5s linear infinite paused;
}
.slider-card:hover .card-border{opacity:1;animation-play-state:running}
@keyframes borderSpin{to{--angle:360deg}}
@property --angle{syntax:'<angle>';initial-value:0deg;inherits:false}

/* Shimmer Effect */
.slider-card .shimmer{
  position:absolute;top:0;left:-100%;width:50%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(201,168,76,.12),transparent);
  transform:skewX(-20deg);transition:left .7s ease;z-index:3;pointer-events:none;
}
.slider-card:hover .shimmer{left:150%}

/* Card Content */
.card-visual{position:relative;height:200px;z-index:4;display:flex;align-items:center;justify-content:center;overflow:hidden}
.card-visual-bg{position:absolute;inset:0;transition:transform .6s ease}
.slider-card:hover .card-visual-bg{transform:scale(1.1)}

/* Lens Sphere */
.card-lens-sphere{
  position:relative;z-index:5;width:130px;height:130px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  animation:lensFloat 5s ease-in-out infinite;
  transition:transform .5s ease,box-shadow .5s ease;
}
@keyframes lensFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.slider-card:hover .card-lens-sphere{transform:scale(1.15) translateY(-5px);animation-play-state:paused;box-shadow:0 0 40px rgba(201,168,76,.3)}
.card-lens-sphere::before{
  content:'';position:absolute;inset:-3px;border-radius:50%;
  border:1px solid rgba(255,255,255,.1);animation:ringSpin 8s linear infinite;
}
@keyframes ringSpin{to{transform:rotate(360deg)}}
.card-lens-inner{width:110px;height:110px;border-radius:50%;box-shadow:inset 0 0 25px rgba(0,0,0,.4)}

/* Color Dots */
.card-dots{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:6}
.card-dot{width:18px;height:18px;border-radius:50%;border:2px solid rgba(255,255,255,.15);position:relative;overflow:hidden;transition:transform .3s}
.card-dot::after{content:'';position:absolute;inset:25%;border-radius:50%;background:linear-gradient(135deg,rgba(255,255,255,.25),transparent)}
.slider-card:hover .card-dot{transform:scale(1.2)}

/* Card Body */
.card-body{position:relative;z-index:4;padding:20px 24px}
.card-badge{
  display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:50px;
  background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.15);
  font-size:9px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;
}
.card-badge .dot{width:5px;height:5px;border-radius:50%;background:var(--gold);animation:pulseDot 2s infinite}
@keyframes pulseDot{0%,100%{opacity:1}50%{opacity:.4}}
.card-name{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;margin-bottom:6px;transition:color .3s}
.slider-card:hover .card-name{color:var(--gold-light)}
.card-count{font-size:11px;color:var(--text-dim);margin-bottom:16px}

.card-footer{display:flex;justify-content:space-between;align-items:center;padding-top:14px;border-top:1px solid rgba(201,168,76,.08)}
.card-price{font-size:13px;color:var(--text-dim)}
.card-price strong{font-size:18px;color:var(--gold);font-weight:700}
.card-btn{
  padding:8px 20px;border-radius:50px;background:linear-gradient(135deg,var(--gold),#b8943a);
  color:var(--bg);font-weight:700;font-size:11px;letter-spacing:1px;transition:all .3s;position:relative;overflow:hidden;
}
.card-btn::before{content:'';position:absolute;top:50%;left:50%;width:0;height:0;border-radius:50%;background:rgba(255,255,255,.3);transform:translate(-50%,-50%);transition:width .5s,height .5s}
.card-btn:hover::before{width:180px;height:180px}
.card-btn:hover{transform:translateY(-2px);box-shadow:0 5px 20px rgba(201,168,76,.35)}
.card-btn span{position:relative;z-index:1}

/* Slider Navigation */
.slider-nav{
  position:absolute;top:50%;left:0;right:0;transform:translateY(-50%);
  display:flex;justify-content:space-between;padding:0 10px;pointer-events:none;z-index:20;
}
.slider-btn{
  width:50px;height:50px;border-radius:50%;
  background:rgba(201,168,76,.1);backdrop-filter:blur(10px);
  border:1px solid rgba(201,168,76,.2);color:var(--gold);
  font-size:20px;display:flex;align-items:center;justify-content:center;
  transition:all .3s;pointer-events:auto;cursor:pointer;
}
.slider-btn:hover{background:var(--gold);color:var(--bg);transform:scale(1.1)}
.slider-btn:disabled{opacity:.2;cursor:not-allowed;transform:none}

/* Slider Dots */
.slider-dots{display:flex;justify-content:center;gap:8px;margin-top:24px}
.slider-dot{
  width:10px;height:10px;border-radius:50%;background:rgba(201,168,76,.2);
  transition:all .3s;cursor:pointer;border:2px solid transparent;
}
.slider-dot:hover{background:rgba(201,168,76,.4)}
.slider-dot.active{background:var(--gold);transform:scale(1.4);box-shadow:0 0 15px rgba(201,168,76,.5)}

/* ========== LENS MODAL ========== */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:2000;display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:all .4s;padding:20px;backdrop-filter:blur(12px)}
.modal-bg.open{opacity:1;visibility:visible}
.modal-box{background:rgba(12,10,10,.95);backdrop-filter:blur(40px);border-radius:var(--radius);width:100%;max-width:960px;max-height:90vh;overflow-y:auto;border:1px solid rgba(201,168,76,.08);transform:scale(.9) translateY(40px);transition:transform .6s cubic-bezier(.22,1,.36,1);box-shadow:0 40px 100px rgba(0,0,0,.6)}
.modal-bg.open .modal-box{transform:scale(1) translateY(0)}
.modal-header{padding:24px 36px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(201,168,76,.06);position:sticky;top:0;background:rgba(12,10,10,.98);z-index:2;backdrop-filter:blur(20px);border-radius:var(--radius) var(--radius) 0 0}
.modal-header h2{font-family:'Playfair Display',serif;font-size:26px;color:var(--gold)}
.modal-close{width:44px;height:44px;border-radius:50%;background:rgba(201,168,76,.06);color:var(--gold);display:flex;align-items:center;justify-content:center;font-size:20px;transition:all .3s}
.modal-close:hover{background:var(--gold);color:var(--bg);transform:rotate(90deg)}

.slider-area{padding:40px 36px}
.lens-slider-container{position:relative;overflow:hidden;background:rgba(201,168,76,.015);border-radius:var(--radius);padding:44px 36px;border:1px solid rgba(201,168,76,.05)}
.lens-slider-track{display:flex;transition:transform .6s cubic-bezier(.4,0,.2,1)}
.lens-slide{min-width:100%;display:flex;gap:48px;align-items:center;padding:0 10px}
.lens-visual{width:260px;height:260px;border-radius:50%;position:relative;flex-shrink:0;display:flex;align-items:center;justify-content:center;animation:lensGlow 4s ease-in-out infinite}
@keyframes lensGlow{0%,100%{box-shadow:0 0 50px rgba(201,168,76,.08)}50%{box-shadow:0 0 100px rgba(201,168,76,.15)}}
.lens-visual-ring{position:absolute;inset:-10px;border-radius:50%;border:1px solid rgba(255,255,255,.04);animation:ringRotate 12s linear infinite}
.lens-visual-ring::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:8px;height:8px;border-radius:50%;background:var(--gold);box-shadow:0 0 12px var(--gold)}
@keyframes ringRotate{to{transform:rotate(360deg)}}
.lens-visual-inner{width:220px;height:220px;border-radius:50%;position:relative;overflow:hidden;box-shadow:inset 0 0 50px rgba(0,0,0,.3)}
.lens-visual-inner::after{content:'';position:absolute;inset:18%;border-radius:50%;background:radial-gradient(circle,rgba(0,0,0,.15),transparent 65%)}
.lens-circle{width:100%;height:100%;border-radius:50%}

.lens-details{flex:1}
.lens-details h3{font-family:'Playfair Display',serif;font-size:30px;color:var(--text);margin-bottom:12px}
.lens-desc{font-size:15px;color:var(--text-dim);line-height:1.9;margin-bottom:28px}
.lens-meta{display:flex;gap:18px;margin-bottom:28px;flex-wrap:wrap}
.meta-item{background:rgba(201,168,76,.03);padding:16px 24px;border-radius:var(--radius-sm);border:1px solid rgba(201,168,76,.06);transition:border-color .3s}
.meta-item:hover{border-color:rgba(201,168,76,.15)}
.meta-item .label{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:2px}
.meta-item .value{font-size:24px;font-weight:700;color:var(--gold);margin-top:6px}
.meta-item .value.stock-low{color:#ff9800}
.meta-item .value.stock-out{color:#e74c3c}

.qty-selector{display:flex;align-items:center;gap:16px;margin-bottom:28px}
.qty-selector label{font-size:14px;color:var(--text-dim)}
.qty-ctrl{display:flex;align-items:center;gap:0;background:rgba(201,168,76,.04);border-radius:var(--radius-sm);border:1px solid rgba(201,168,76,.08);overflow:hidden}
.qty-ctrl button{width:46px;height:46px;background:rgba(201,168,76,.04);color:var(--gold);font-size:22px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.qty-ctrl button:hover{background:var(--gold);color:var(--bg)}
.qty-ctrl .qty-display{width:56px;text-align:center;font-size:20px;font-weight:700;color:var(--text)}

.add-lens-btn{padding:18px 44px;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--gold),#b8943a);color:var(--bg);font-weight:700;font-size:15px;transition:all .3s;display:inline-flex;align-items:center;gap:10px;position:relative;overflow:hidden}
.add-lens-btn::before{content:'';position:absolute;top:50%;left:50%;width:0;height:0;border-radius:50%;background:rgba(255,255,255,.2);transform:translate(-50%,-50%);transition:width .6s,height .6s}
.add-lens-btn:hover::before{width:350px;height:350px}

          <div class="card-dots">${dots}</div>
        </div>
        <div class="card-body">
          <div class="card-badge"><span class="dot"></span>${c.arName}</div>
          <div class="card-name">${mainLens.name}</div>
          <div class="card-count">${c.lenses.length} تدرجات · ${totalStock} قطعة</div>
          <div class="card-footer">
            <div class="card-price">من <strong>${getProd(mainLens.id).price} ر.س</strong></div>
            <button class="card-btn"><span>اكتشفي ✦</span></button>
          </div>
        </div>
      </div>
    `;
  }).join('');
  
  // Set background images after render
  document.querySelectorAll('.slider-card').forEach((card,i)=>{
    card.style.setProperty('--nature-bg',`url('${COLORS_DATA[i].natureBg}')`);
  });
  
  // Render dots
  dots.innerHTML=COLORS_DATA.map((_,i)=>`<div class="slider-dot ${i===0?'active':''}" onclick="goToSlide(${i})"></div>`).join('');
  
  // Wait for cards to render then update dimensions
  setTimeout(()=>{
    setupSliderDimensions();
    updateSlider();
    animateCardsEntrance();
  }, 150);
}

/* ========== SETUP SLIDER DIMENSIONS ========== */
function setupSliderDimensions(){
  const track=document.getElementById('sliderTrack');
  const cards=track.querySelectorAll('.slider-card');
  if(!cards.length) return;
  
  // Force equal width for all cards
  const cardWidth=cards[0].offsetWidth;
  cards.forEach(card=>{
    card.style.flex=`0 0 ${cardWidth}px`;
  });
}

/* ========== ANIMATE CARDS ENTRANCE ========== */
function animateCardsEntrance(){
  const cards=document.querySelectorAll('.slider-card');
  cards.forEach((card,i)=>{
    setTimeout(()=>{
      card.style.opacity='1';
      card.style.transform='translateX(0) rotateY(0)';
    }, i * 120);
  });
}

/* ========== UPDATE SLIDER POSITION ========== */
function updateSlider(){
  const track=document.getElementById('sliderTrack');
  const cardWidth=getCardWidth();
  const translateX=currentSlide * cardWidth;
  
  track.style.transform=`translateX(-${translateX}px)`;
  
  // Update dots
  document.querySelectorAll('.slider-dot').forEach((d,i)=>d.classList.toggle('active',i===currentSlide));
  
  // Update buttons
  document.getElementById('prevBtn').disabled=currentSlide===0;
  document.getElementById('nextBtn').disabled=currentSlide>=COLORS_DATA.length-1;
}

/* ========== SLIDE NAVIGATION ========== */
function slideMove(dir){
  const max=COLORS_DATA.length-1;
  currentSlide=Math.max(0,Math.min(max,currentSlide+dir));
  updateSlider();
}

function goToSlide(i){
  currentSlide=i;
  updateSlider();
}

/* ========== RESIZE HANDLER ========== */
let resizeTimer;
window.addEventListener('resize',()=>{
  clearTimeout(resizeTimer);
  resizeTimer=setTimeout(()=>{
    setupSliderDimensions();
    updateSlider();
  }, 250);
});

/* ========== TOUCH/SWIPE SUPPORT ========== */
let touchStartX=0,touchEndX=0;
const sliderTrack=document.getElementById('sliderTrack');

if(sliderTrack){
  sliderTrack.addEventListener('touchstart',e=>{
    touchStartX=e.changedTouches[0].screenX;
  },{passive:true});
  
  sliderTrack.addEventListener('touchend',e=>{
    touchEndX=e.changedTouches[0].screenX;
    handleSwipe();
  },{passive:true});
}

function handleSwipe(){
  const threshold=50;
  const diff=touchStartX-touchEndX;
  
  if(Math.abs(diff)>threshold){
    if(diff>0) slideMove(1);
    else slideMove(-1);
  }
}

/* ========== MOUSE DRAG SUPPORT ========== */
let isDragging=false,startX=0,startSlide=0;

if(sliderTrack){
  sliderTrack.addEventListener('mousedown',e=>{
    isDragging=true;
    startX=e.pageX;
    startSlide=currentSlide;
    sliderTrack.style.cursor='grabbing';
    sliderTrack.style.transition='none';
  });
  
  document.addEventListener('mousemove',e=>{
    if(!isDragging) return;
    const diff=startX-e.pageX;
    const cardWidth=getCardWidth();
    const slideOffset=diff/cardWidth;
    const newPos=startSlide+slideOffset;
    
    sliderTrack.style.transform=`translateX(-${newPos*cardWidth}px)`;
  });
  
  document.addEventListener('mouseup',()=>{
    if(!isDragging) return;
    isDragging=false;
    sliderTrack.style.cursor='grab';
    sliderTrack.style.transition='transform .6s cubic-bezier(.22,1,.36,1)';
    
    // Snap to nearest slide
    const cardWidth=getCardWidth();
    const currentPos=-parseFloat(sliderTrack.style.transform.replace(/[^-\d.]/g,''))||0;
    const nearestSlide=Math.round(currentPos/cardWidth);
    currentSlide=Math.max(0,Math.min(COLORS_DATA.length-1,nearestSlide));
    updateSlider();
  });
}

/* ========== LENS MODAL ========== */
function openLensModal(ci){
  currentLensIdx=0;
  document.getElementById('modalTitle').textContent=COLORS_DATA[ci].arName;
  renderLensSlider(ci);
  document.getElementById('lensModal').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeLensModal(){
  document.getElementById('lensModal').classList.remove('open');
  document.body.style.overflow='';
}

function renderLensSlider(ci){
  const cat=COLORS_DATA[ci];
  document.getElementById('lensTrack').innerHTML=cat.lenses.map((l,li)=>{
    const p=getProd(l.id);
    const sc=p.stock===0?'stock-out':p.stock<=5?'stock-low':'';
    const st=p.stock===0?'نفذ من المخزن':p.stock<=5?`باقي ${p.stock} فقط!`:`${p.stock} قطعة`;
    return `
      <div class="lens-slide">
        <div class="lens-visual">
          <div class="lens-visual-ring"></div>
          <div class="lens-visual-inner"><div class="lens-circle" style="background:${l.gradient};box-shadow:0 0 60px ${l.color}25"></div></div>
        </div>
        <div class="lens-details">
          <h3>${l.name}</h3>
          <p class="lens-desc">${l.desc}</p>
          <div class="lens-meta">
            <div class="meta-item"><div class="label">السعر</div><div class="value">${l.price} ر.س</div></div>
            <div class="meta-item"><div class="label">المتاح</div><div class="value ${sc}">${st}</div></div>
          </div>
          <div class="qty-selector">
            <label>الكمية:</label>
            <div class="qty-ctrl">
              <button onclick="changeModalQty(-1,${li})">−</button>
              <div class="qty-display" id="mq_${li}">1</div>
              <button onclick="changeModalQty(1,${li})">+</button>
            </div>
          </div>
          <button class="add-lens-btn" onclick="addFromSlider('${l.id}',${li})" ${p.stock===0?'disabled':''}>
            <span>${p.stock===0?' غير متوفر':'🛒  أضف للسلة'}</span>
          </button>
        </div>
      </div>
    `;
  }).join('');
  
  document.getElementById('lensSliderDots').innerHTML=cat.lenses.map((_,li)=>`<div class="slider-dot-modal ${li===0?'active':''}" onclick="goToLensSlide(${li})"></div>`).join('');
  updateLensSlider();
}

function updateLensSlider(){
  document.getElementById('lensTrack').style.transform=`translateX(${currentLensIdx*100}%)`;
  document.querySelectorAll('.slider-dot-modal').forEach((d,i)=>d.classList.toggle('active',i===currentLensIdx));
  const cat=COLORS_DATA.find(c=>c.lenses.length>currentLensIdx)||COLORS_DATA[0];
  document.getElementById('lensPrevBtn').disabled=currentLensIdx===0;
  document.getElementById('lensNextBtn').disabled=currentLensIdx>=cat.lenses.length-1;
}

function slideLensMove(dir){
  const cat=COLORS_DATA.find(c=>c.lenses.length>currentLensIdx)||COLORS_DATA[0];
  currentLensIdx=Math.max(0,Math.min(cat.lenses.length-1,currentLensIdx+dir));
  updateLensSlider();
}

function goToLensSlide(i){currentLensIdx=i;updateLensSlider();}

function changeModalQty(delta,li){
  const el=document.getElementById(`mq_${li}`);
  let v=parseInt(el.textContent)+delta;
  const cat=COLORS_DATA.find(c=>c.lenses[li]);
  const p=getProd(cat?.lenses[li]?.id);
  v=Math.max(1,Math.min(v,Math.max(1,p?.stock||1)));
  el.textContent=v;
}

function addFromSlider(lensId,li){
  const p=getProd(lensId);if(!p||p.stock<=0)return;
  const qty=parseInt(document.getElementById(`mq_${li}`).textContent);
  const inCart=cart.find(c=>c.productId===lensId);
  const current=inCart?inCart.qty:0;
  if(current+qty>p.stock){showToast('⚠️ الكمية تتجاوز المتاح');return}
  if(inCart)inCart.qty+=qty;else cart.push({productId:lensId,qty});
  saveData();updateCartBadge();
  showToast(`✅ تمت إضافة "${p.name}" (${qty} قطعة)`);
  document.getElementById(`mq_${li}`).textContent='1';
}

/* ========== CART ========== */
function updateCartBadge(){
  const t=cart.reduce((s,c)=>s+c.qty,0);
  const b=document.getElementById('cartBadge');
  b.textContent=t;b.style.display=t>0?'flex':'none';
}

function openCart(){
  document.getElementById('cartOverlay').classList.add('open');
  document.getElementById('cartPanel').classList.add('open');
  renderCart();
}

function closeCart(){
  document.getElementById('cartOverlay').classList.remove('open');
  document.getElementById('cartPanel').classList.remove('open');
}

function renderCart(){
  const list=document.getElementById('cartItemsList');
  const bottom=document.getElementById('cartBottom');
  
  if(cart.length===0){
    list.innerHTML=`<div class="cart-empty"><div class="ce-icon">👁️</div><p>السلة فارغة</p><p style="font-size:13px;margin-top:8px">تصفحي الألوان وأضيفي عدساتك!</p></div>`;
    bottom.innerHTML='';
    return;
  }
  
  list.innerHTML=cart.map(c=>{
    const p=getProd(c.productId);if(!p)return'';
    return `<div class="ci">
      <div class="ci-color" style="background:${p.gradient}"></div>
      <div class="ci-info">
        <div class="ci-name">${p.name}</div>
        <div class="ci-cat">${p.categoryName}</div>
        <div class="ci-bottom">
          <span class="ci-price">${p.price*c.qty} ر.س</span>
          <div class="ci-qty">
            <button onclick="changeCartQty('${c.productId}',-1)">−</button>
            <span>${c.qty}</span>
            <button onclick="changeCartQty('${c.productId}',1)">+</button>
          </div>
        </div>
      </div>
      <button class="ci-remove" onclick="removeFromCart('${c.productId}')">🗑</button>
    </div>`;
  }).join('');
  
  const sub=cart.reduce((s,c)=>{const p=getProd(c.productId);return s+(p?p.price*c.qty:0)},0);
  const ship=sub>=200?0:15;
  const total=sub+ship;
  
  bottom.innerHTML=`
    <div class="cb-row"><span>المجموع</span><span>${sub} ر.س</span></div>
    <div class="cb-row"><span>الشحن ${ship===0?'(مجاني)':''}</span><span>${ship===0?'مجاني':ship+' ر.س'}</span></div>
    <div class="cb-row total"><span>الإجمالي</span><span>${total} ر.س</span></div>
    <button class="checkout-btn" onclick="checkout()">🧾 إتمام الشراء وإصدار الفاتورة</button>
  `;
}

function changeCartQty(pid,delta){
  const item=cart.find(c=>c.productId===pid);const p=getProd(pid);
  if(!item||!p)return;item.qty+=delta;
  if(item.qty<=0){removeFromCart(pid);return}
  if(item.qty>p.stock){item.qty=p.stock;showToast('⚠️ الحد الأقصى')}
  saveData();updateCartBadge();renderCart();
}

function removeFromCart(pid){cart=cart.filter(c=>c.productId!==pid);saveData();updateCartBadge();renderCart();}

/* ========== CHECKOUT ========== */
function checkout(){
  if(cart.length===0)return;
  cart.forEach(c=>{const p=getProd(c.productId);if(p)p.stock=Math.max(0,p.stock-c.qty)});
  let sub=0;
  const items=cart.map(c=>{const p=getProd(c.productId);const line=p.price*c.qty;sub+=line;return{name:p.name,category:p.categoryName,price:p.price,qty:c.qty,lineTotal:line,color:p.color,gradient:p.gradient}});
  const ship=sub>=200?0:15;const total=sub+ship;
  const order={id:'LSR-'+Date.now().toString(36).toUpperCase(),date:new Date().toLocaleDateString('ar-SA',{year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'}),items,sub,ship,total,status:'completed'};
  orders.push(order);saveData();showInvoice(order);
  cart=[];saveData();updateCartBadge();closeCart();renderSlider();
  showToast('✅ تم الشراء بنجاح!');
}

/* ========== INVOICE ========== */
function showInvoice(order){
  document.getElementById('invBox').innerHTML=`
    <div class="inv-top"><div class="inv-brand">LENSORA<small>عدسات ملونة فاخرة</small></div>
    <div class="inv-info"><div>فاتورة #: <strong>${order.id}</strong></div><div>التاريخ: ${order.date}</div><div>الحالة: ✅ مكتمل</div></div></div>
    <table class="inv-table"><thead><tr><th>المنتج</th><th>السعر</th><th>الكمية</th><th>الإجمالي</th></tr></thead>
    <tbody>${order.items.map(it=>`<tr><td><span class="inv-color-dot" style="background:${it.gradient}"></span>${it.name}<br><small style="color:#999">${it.category}</small></td><td>${it.price} ر.س</td><td>${it.qty}</td><td><strong>${it.lineTotal} ر.س</strong></td></tr>`).join('')}</tbody></table>
    <div class="inv-totals">
      <div class="inv-row"><span>المجموع</span><span>${order.sub} ر.س</span></div>
      <div class="inv-row"><span>الشحن</span><span>${order.ship===0?'مجاني':order.ship+' ر.س'}</span></div>
      <div class="inv-total"><span>الإجمالي</span><span>${order.total} ر.س</span></div>
    </div>
    <div class="inv-actions"><button class="inv-btn inv-print" onclick="window.print()">🖨️ طباعة</button><button class="inv-btn inv-done" onclick="closeInvoice()">إغلاق</button></div>
  `;
  document.getElementById('invOverlay').classList.add('open');
}
function closeInvoice(){document.getElementById('invOverlay').classList.remove('open');}

/* ========== TOAST ========== */
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

/* ========== KEYBOARD ========== */
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeLensModal();closeCart();closeInvoice();}
});

/* ========== PARTICLES ========== */
const canvas=document.getElementById('particlesCanvas');const ctx=canvas.getContext('2d');let particles=[];
function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
resizeCanvas();window.addEventListener('resize',resizeCanvas);
class Particle{constructor(){this.reset();}
reset(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.size=Math.random()*1.5+.5;this.sx=(Math.random()-.5)*.25;this.sy=(Math.random()-.5)*.15;this.op=Math.random()*.35+.08;this.pulse=Math.random()*Math.PI*2;this.ps=Math.random()*.02+.005;}
update(){this.x+=this.sx;this.y+=this.sy;this.pulse+=this.ps;if(this.x<0||this.x>canvas.width||this.y<0||this.y>canvas.height)this.reset();}
draw(){const a=this.op*(.5+.5*Math.sin(this.pulse));ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fillStyle=`rgba(201,168,76,${a})`;ctx.fill();}}
for(let i=0;i<60;i++)particles.push(new Particle());
(function anim(){ctx.clearRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw();});requestAnimationFrame(anim);})();

/* ========== NAV SCROLL ========== */
window.addEventListener('scroll',()=>{document.getElementById('mainNav').classList.toggle('scrolled',window.scrollY>60);});

/* ========== INIT ========== */
renderSlider();updateCartBadge();
</script>
