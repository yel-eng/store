<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

  // 🔑 ضع بيانات مشروعك هنا
  const SUPABASE_URL = 'رابط_المشروع_هنا'
  const SUPABASE_KEY = 'المفتاح_العام_هنا'
  const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

  // ========== STATE & CONFIG ==========
  const state = { products: [], cart: [], wishlist: [], currentLang: 'ar', currentCurrency: 'SAR' }
  const CONFIG = {
    i18n: { exchangeRates: { SAR: 1, USD: 0.27, AED: 0.99, EGP: 12.5 } }
  }

  // ========== UTILS ==========
  function adjColor(hex, amount) {
    hex = hex.replace('#','');
    const r = Math.max(0, Math.min(255, parseInt(hex.substring(0,2),16)+amount));
    const g = Math.max(0, Math.min(255, parseInt(hex.substring(2,4),16)+amount));
    const b = Math.max(0, Math.min(255, parseInt(hex.substring(4,6),16)+amount));
    return '#'+[r,g,b].map(c=>c.toString(16).padStart(2,'0')).join('');
  }
  function generateLensGradient(color) {
    return `radial-gradient(circle at 40% 35%,${color},${adjColor(color,-30)},${adjColor(color,-70)})`;
  }
  function getPrice(p) {
    const rate = CONFIG.i18n.exchangeRates[state.currentCurrency] || 1;
    return Math.round((p.price || 0) * rate);
  }
  function getCurrencySymbol() { return { SAR: 'ر.س', USD: '$', AED: 'د.إ', EGP: 'ج.م' }[state.currentCurrency]; }
  function getText(ar, en) { return state.currentLang === 'ar' ? ar : (en || ar); }
  function getAvailableStock(p) { return Math.max(0, (p.stock_real||0) - (p.stock_reserved||0)); }
  
  const SecureStorage = {
    set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e){} },
    get: (k) => { try { return JSON.parse(localStorage.getItem(k)); } catch(e){ return null; } }
  };

  // ========== LOAD DATA FROM SUPABASE ==========
  async function loadData() {
    try {
      console.log('🔄 جاري المزامنة مع Supabase...');
      
      const { data: products, error } = await supabase
        .from('products')
        .select(`*, category:categories!left(name_ar, name_en, color)`)
        .eq('visible', true)
        .order('created_at', { ascending: false });

      if (error) throw error;

      // تحويل بيانات Supabase لتنسيق الموقع
      state.products = (products || []).map(p => ({
        id: p.id,
        name: p.name_ar,
        enName: p.name_en,
        categoryId: p.category_id,
        categoryName: p.category?.name_ar || 'عام',
        categoryNameEn: p.category?.name_en || 'General',
        categoryColor: p.category?.color || '#c9a84c',
        price: p.price || 0,
        stockReal: p.stock_real || 0,
        stockReserved: p.stock_reserved || 0,
        color: p.color || '#c9a84c',
        gradient: p.gradient || generateLensGradient(p.color || '#c9a84c'),
        desc: p.description || '',
        rating: p.rating || 4.5,
        reviews: p.reviews_count || 0,
        image: p.lens_image_url || '',
        opacity: p.opacity || 0.7,
        lensSize: p.lens_size || 85
      }));

      state.cart = SecureStorage.get('lensora_cart') || [];
      state.wishlist = SecureStorage.get('lensora_wishlist') || [];

      console.log(`✅ تم تحميل ${state.products.length} منتج من السحابة`);
      initSmoothSlider();
      updateCartBadge();
      setupEvents();
      document.body.classList.remove('loading');

    } catch (err) {
      console.error('❌ فشل الاتصال بـ Supabase:', err);
      showToast('⚠️ خطأ في الاتصال، جرب تحديث الصفحة', 'error');
    }
  }

  function saveData() {
    SecureStorage.set('lensora_cart', state.cart);
    SecureStorage.set('lensora_wishlist', state.wishlist);
  }
  function getProduct(id) { return state.products.find(p => p.id === id) || { stock_real: 0, stock_reserved: 0, price: 0, name: '', gradient: '' }; }

  // ========== UI FUNCTIONS (Attached to window for HTML onclick) ==========
  window.toggleWishlist = function(productId) {
    const p = getProduct(productId);
    const idx = state.wishlist.findIndex(w => w.productId === productId);
    if (idx === -1) { state.wishlist.push({ productId, addedAt: Date.now() }); showToast(`✅ "${p.name}" أضيفت للمفضلة`, 'success'); }
    else { state.wishlist.splice(idx, 1); showToast('🗑️ أزيلت من المفضلة', 'info'); }
    saveData();
    document.querySelectorAll('.slider-card').forEach(card => {
      const btn = card.querySelector('.card-wishlist');
      if (btn) {
        const mainId = state.products.find(pr => pr.name === card.querySelector('.card-name')?.textContent)?.id;
        if (mainId) {
          const inWL = state.wishlist.some(w => w.productId === mainId);
          btn.className = `card-wishlist ${inWL ? 'active' : ''}`;
          btn.innerHTML = inWL ? '❤️' : '♡';
        }
      }
    });
  };

  window.openWishlist = function() {
    const container = document.getElementById('wishlistItems');
    if (state.wishlist.length === 0) { container.innerHTML = '<div class="cart-empty"><div class="ce-icon">♡</div><p>المفضلة فارغة</p></div>'; }
    else {
      container.innerHTML = state.wishlist.map(w => {
        const p = getProduct(w.productId); if (!p) return '';
        return `<div class="wi"><div class="wi-color" style="background:${p.gradient}"></div><div class="wi-info"><div class="wi-name">${p.name}</div><div class="wi-price">${getPrice(p)} ${getCurrencySymbol()}</div></div></div>`;
      }).join('');
    }
    document.getElementById('wishlistOverlay').classList.add('open');
    document.getElementById('wishlistPanel').classList.add('open');
  };
  window.closeWishlist = function() {
    document.getElementById('wishlistOverlay').classList.remove('open');
    document.getElementById('wishlistPanel').classList.remove('open');
  };

  window.scrollToProducts = function() { document.getElementById('products').scrollIntoView({ behavior: 'smooth' }); };
  window.showPrivacy = () => showToast('📄 سياسة الخصوصية', 'info');
  window.showTerms = () => showToast('📋 الشروط والأحكام', 'info');
  window.showShipping = () => showToast('🚚 شحن مجاني فوق 200 ر.س', 'info');
  window.showReturns = () => showToast('🔄 إرجاع خلال 14 يوم', 'info');
  window.showContact = () => showToast('💬 support@lensora.com', 'info');
  window.trackSocial = (p) => console.log('Social:', p);
  window.showCookieSettings = () => showToast('🔧 قيد التطوير', 'info');
  window.acceptCookies = () => { SecureStorage.set('cookies_accepted', true); document.getElementById('cookieBanner').classList.remove('show'); };
  window.confirmAge = () => { SecureStorage.set('age_verified', true); document.getElementById('ageModal').classList.add('hidden'); };
  window.exitSite = () => window.location.href = 'https://www.google.com';

  window.showToast = function(msg, type='info') {
    const t = document.getElementById('toast'); t.textContent = msg; t.className = `toast ${type} show`;
    setTimeout(() => t.classList.remove('show'), 3000);
  };

  // ========== SLIDER (نفس الكود السابق مع تعديل بسيط لجلب البيانات) ==========
  function initSmoothSlider() {
    const track = document.getElementById('sliderTrack');
    if (!track) return;
    const GAP = 28, CARD_W = window.innerWidth <= 360 ? 240 : window.innerWidth <= 768 ? 260 : 340;
    const ITEM_W = CARD_W + GAP;
    const grouped = {};
    state.products.forEach(p => {
      if (!grouped[p.categoryId]) grouped[p.categoryId] = { id: p.categoryId, arName: p.categoryName, enName: p.categoryNameEn, color: p.categoryColor, lenses: [] };
      grouped[p.categoryId].lenses.push(p);
    });
    const cats = Object.values(grouped);
    let html = '';
    cats.forEach((cat, i) => {
      const main = cat.lenses[0];
      const totalStock = cat.lenses.reduce((s,l) => s + getAvailableStock(l), 0);
      html += `<div class="slider-card" data-idx="${i}">
        <button class="card-wishlist" onclick="event.stopPropagation();toggleWishlist('${main.id}')">♡</button>
        <div class="card-bg" style="background:linear-gradient(135deg,${adjColor(cat.color,-60)},${cat.color},${adjColor(cat.color,30)})"></div>
        <div class="card-visual"><div class="card-lens-sphere"><div class="card-lens-inner" style="background:${main.gradient}"></div></div></div>
        <div class="card-body">
          <div class="card-badge"><span class="dot"></span>${cat.arName}</div>
          <div class="card-name">${main.name}</div>
          <div class="card-count">${cat.lenses.length} تدرجات · ${totalStock} قطعة</div>
          <div class="card-footer"><div class="card-price">من <strong>${getPrice(main)} ${getCurrencySymbol()}</strong></div><button class="card-btn" onclick="event.stopPropagation();openLensModal(${i})">اكتشفي ✦</button></div>
        </div>
      </div>`;
    });
    track.innerHTML = html;
    // (باقي كود السلايدر والـ Modal موجود في نسختك الأصلية، ضعه هنا كما هو)
    // ⚠️ لتنظيم المساحة، انسخ دوال `openLensModal`, `renderLensSlider`, `addFromSlider`, `openCart`, `renderCart`, `checkout` من ملفك الأصلي وضعها هنا.
    // كل الدوال بتشتغل على `state.products` اللي إحنا جبناه من Supabase، فمش هتحتاج تعديل فيها!
  }

  function setupEvents() {
    document.addEventListener('keydown', e => { if(e.key==='Escape') { closeLensModal(); closeCart(); closeWishlist(); } });
    window.addEventListener('scroll', () => document.getElementById('mainNav').classList.toggle('scrolled', window.scrollY > 50), { passive: true });
    if(SecureStorage.get('age_verified')) document.getElementById('ageModal').classList.add('hidden');
    if(!SecureStorage.get('cookies_accepted')) setTimeout(() => document.getElementById('cookieBanner').classList.add('show'), 1500);
  }
  
  window.changeLanguage = function(lang) { state.currentLang = lang; document.documentElement.lang = lang; document.documentElement.dir = lang==='ar'?'rtl':'ltr'; initSmoothSlider(); };
  window.changeCurrency = function(curr) { state.currentCurrency = curr; initSmoothSlider(); };
  window.openCart = function() { renderCart(); document.getElementById('cartOverlay').classList.add('open'); document.getElementById('cartPanel').classList.add('open'); };
  window.closeCart = function() { document.getElementById('cartOverlay').classList.remove('open'); document.getElementById('cartPanel').classList.remove('open'); };

  // تشغيل التطبيق
  document.addEventListener('DOMContentLoaded', loadData);
</script>
