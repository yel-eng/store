<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lensora — عدسات ملونة فاخرة</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5.1.0/index.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/playfair-display@5.1.0/index.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#0a0808;--card-bg:rgba(18,14,12,.72);--gold:#c9a84c;--gold-light:#e8d5a3;--text:#f5ede0;--text-dim:#8a7e73;--radius:24px;--radius-sm:14px;--success:#2ecc71;--warning:#f39c12;--error:#e74c3c;--transition:.3s ease}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;min-height:100vh;line-height:1.6}
button{cursor:pointer;border:none;font-family:inherit;background:none;color:inherit}
button:disabled{opacity:.5;cursor:not-allowed}
.nav{position:fixed;top:0;left:0;right:0;padding:18px 5%;display:flex;justify-content:space-between;align-items:center;background:rgba(6,4,4,.85);backdrop-filter:blur(20px);z-index:100;border-bottom:1px solid rgba(201,168,76,.1)}
.nav-logo{font-family:'Playfair Display',serif;font-size:24px;color:var(--gold);letter-spacing:4px;text-decoration:none}
.cart-btn{background:rgba(201,168,76,.06);color:var(--gold);padding:12px 22px;border-radius:50px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;border:1px solid rgba(201,168,76,.08);position:relative}
.cart-badge{background:#e74c3c;color:#fff;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;position:absolute;top:-6px;left:-6px}
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:100px 20px}
.hero-title{font-family:'Playfair Display',serif;font-size:clamp(40px,7vw,68px);color:var(--gold);letter-spacing:8px;margin-bottom:20px}
.hero-sub{font-size:15px;color:var(--text-dim);max-width:500px;margin:0 auto 40px;line-height:1.9}
.categories-section{padding:40px 5% 80px;max-width:1500px;margin:0 auto}
.section-header{text-align:center;margin-bottom:40px}
.section-title{font-family:'Playfair Display',serif;font-size:clamp(28px,4vw,40px);margin-bottom:12px}
.slider-container{position:relative;overflow:hidden}
.slider-viewport{overflow:hidden;padding:20px 0}
.slider-track{display:flex;gap:28px;will-change:transform;direction:ltr}
.slider-card{flex:0 0 340px;position:relative;border-radius:var(--radius);overflow:hidden;cursor:pointer;background:var(--card-bg);backdrop-filter:blur(24px);border:1px solid rgba(201,168,76,.06);transition:transform .3s}
.slider-card:hover{transform:translateY(-12px) scale(1.03);box-shadow:0 30px 80px rgba(0,0,0,.6),0 0 60px rgba(201,168,76,.12)}
.card-visual{position:relative;height:230px;display:flex;align-items:center;justify-content:center;background:rgba(201,168,76,.05)}
.card-lens-sphere{width:140px;height:140px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.card-lens-inner{width:120px;height:120px;border-radius:50%;box-shadow:inset 0 0 30px rgba(0,0,0,.4)}
.card-body{padding:24px 28px}
.card-badge{display:inline-flex;align-items:center;gap:5px;padding:5px 14px;border-radius:50px;background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.12);font-size:9px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:14px}
.card-name{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;margin-bottom:8px}
.card-count{font-size:11px;color:var(--text-dim);margin-bottom:18px}
.card-footer{display:flex;justify-content:space-between;align-items:center;padding-top:16px;border-top:1px solid rgba(201,168,76,.06)}
.card-price{font-size:13px;color:var(--text-dim)}

.card-btn{padding:9px 22px;border-radius:50px;background:linear-gradient(135deg,var(--gold),#b8943a);color:var(--bg);font-weight:700;font-size:11px;letter-spacing:1px}
.slider-controls{display:flex;align-items:center;justify-content:center;gap:20px;margin-top:36px}
.slider-nav-btn{width:52px;height:52px;border-radius:50%;background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.12);color:var(--gold);font-size:20px;display:flex;align-items:center;justify-content:center}
.slider-dots{display:flex;gap:10px}
.slider-dot{width:12px;height:12px;border-radius:50%;background:rgba(201,168,76,.12);cursor:pointer}
.slider-dot.active{background:var(--gold);transform:scale(1.4)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:2000;display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:all .3s;padding:20px}
.modal-bg.open{opacity:1;visibility:visible}
.modal-box{background:#121010;border-radius:var(--radius);width:100%;max-width:1000px;max-height:92vh;overflow-y:auto;border:1px solid rgba(201,168,76,.06);transform:scale(.92);transition:transform .3s;position:relative}

.modal-close{width:44px;height:44px;border-radius:50%;background:rgba(201,168,76,.06);color:var(--gold);display:flex;align-items:center;justify-content:center;font-size:20px}
.slider-area{padding:40px 36px}
.lens-slider-track{display:flex;transition:transform .3s}
.lens-slide{min-width:100%;display:flex;gap:48px;align-items:center;padding:0 10px}
.lens-visual{width:260px;height:260px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.lens-visual-inner{width:220px;height:220px;border-radius:50%;box-shadow:inset 0 0 50px rgba(0,0,0,.3)}
.lens-circle{width:100%;height:100%;border-radius:50%}
.lens-details{flex:1}
.lens-details h3{font-family:'Playfair Display',serif;font-size:30px;color:var(--text);margin-bottom:12px}
.lens-desc{font-size:15px;color:var(--text-dim);line-height:1.9;margin-bottom:28px}
.lens-meta{display:flex;gap:18px;margin-bottom:28px;flex-wrap:wrap}
.meta-item{background:rgba(201,168,76,.03);padding:16px 24px;border-radius:var(--radius-sm);border:1px solid rgba(201,168,76,.04)}
.meta-item .label{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:2px}

.qty-selector{display:flex;align-items:center;gap:16px;margin-bottom:28px}
.qty-ctrl{display:flex;align-items:center;background:rgba(201,168,76,.04);border-radius:var(--radius-sm);border:1px solid rgba(201,168,76,.06);overflow:hidden}
.qty-ctrl button{width:46px;height:46px;background:rgba(201,168,76,.04);color:var(--gold);font-size:22px;display:flex;align-items:center;justify-content:center}

.add-lens-btn{padding:18px 44px;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--gold),#b8943a);color:var(--bg);font-weight:700;font-size:15px;display:inline-flex;align-items:center;gap:10px;width:100%;justify-content:center}
.cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:3000;opacity:0;visibility:hidden;transition:all .3s}
.cart-overlay.open{opacity:1;visibility:visible}
.cart-panel{position:fixed;top:0;left:0;width:460px;max-width:100vw;height:100vh;background:rgba(10,8,8,.96);z-index:3001;transform:translateX(-100%);transition:transform .3s;display:flex;flex-direction:column;border-left:1px solid rgba(201,168,76,.04)}
.cart-panel.open{transform:translateX(0)}
.cart-top{padding:28px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(201,168,76,.04)}
.cart-top h2{font-family:'Playfair Display',serif;font-size:24px;color:var(--gold)}
.cart-items-list{flex:1;overflow-y:auto;padding:20px 28px}
.ci{display:flex;gap:16px;padding:20px 0;border-bottom:1px solid rgba(201,168,76,.03)}
.ci-color{width:58px;height:58px;border-radius:50%;flex-shrink:0}
.ci-info{flex:1}
.ci-name{font-size:15px;font-weight:600;margin-bottom:4px}
.ci-cat{font-size:11px;color:var(--text-dim);margin-bottom:12px}
.ci-bottom{display:flex;justify-content:space-between;align-items:center}
.ci-price{font-size:18px;font-weight:700;color:var(--gold)}
.ci-qty{display:flex;align-items:center;gap:8px}
.ci-qty button{width:30px;height:30px;border-radius:8px;background:rgba(201,168,76,.04);color:var(--gold);font-size:16px;display:flex;align-items:center;justify-content:center}
.ci-qty span{font-size:16px;font-weight:600;min-width:24px;text-align:center}
.ci-remove{background:none;color:rgba(231,76,60,.5);font-size:16px;padding:4px}
.cart-bottom{padding:32px;border-top:1px solid rgba(201,168,76,.04)}
.cb-row{display:flex;justify-content:space-between;margin-bottom:12px;font-size:14px;color:var(--text-dim)}
.cb-row.total{font-size:24px;font-weight:700;color:var(--gold);padding-top:16px;border-top:1px solid rgba(201,168,76,.06);margin-top:12px}
.checkout-btn{width:100%;padding:18px;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--gold),#b8943a);color:var(--bg);font-weight:700;font-size:15px;margin-top:18px}
.checkout-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:4000;display:none;align-items:center;justify-content:center;padding:20px}
.checkout-overlay.show{display:flex}
.checkout-modal{background:var(--card-bg);border:1px solid var(--gold);border-radius:var(--radius);width:100%;max-width:700px;max-height:90vh;overflow-y:auto;padding:25px}
.checkout-title{font-family:'Playfair Display',serif;color:var(--gold);font-size:22px;margin-bottom:20px;text-align:center}
.checkout-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px}
.checkout-group{display:flex;flex-direction:column;gap:5px}
.checkout-group label{font-size:11px;color:var(--text-dim)}
.checkout-group input,.checkout-group select,.checkout-group textarea{background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.1);border-radius:8px;padding:10px;color:var(--text);font-size:13px}
.checkout-group.full{grid-column:1/-1}
.checkout-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;padding-top:15px;border-top:1px solid rgba(255,255,255,.1)}
.checkout-btn-submit{padding:12px 24px;border-radius:8px;font-weight:600;cursor:pointer;border:none;background:var(--gold);color:var(--bg)}
.checkout-btn-cancel{padding:12px 24px;border-radius:8px;font-weight:600;cursor:pointer;border:none;background:rgba(255,255,255,.1);color:var(--text)}
.toast{position:fixed;bottom:36px;left:50%;transform:translateX(-50%) translateY(120px);background:rgba(14,12,12,.95);border:1px solid rgba(201,168,76,.12);color:var(--text);padding:18px 36px;border-radius:var(--radius-sm);font-size:14px;z-index:9999;transition:transform .3s}
.toast.show{transform:translateX(-50%) translateY(0)}
@media(max-width:768px){.slider-card{flex:0 0 280px}.lens-slide{flex-direction:column;text-align:center;gap:32px}.lens-visual{width:200px;height:200px}.lens-visual-inner{width:170px;height:170px}.cart-panel{width:100%}.checkout-grid{grid-template-columns:1fr}}
</style>
</head>

<script>
const SUPABASE_URL = 'https://bdgnhmqmttiksuhoamil.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJkZ25obXFtdHRpa3N1aG9hbWlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5NjUwNTEsImV4cCI6MjA5NDU0MTA1MX0.X9-9HMqbXod2vyHRpd26MuBNTcqo4VERUwRI1o5lzMw';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const CONFIG = {
    i18n: { defaultLang: 'ar', defaultCurrency: 'SAR', exchangeRates: { SAR: 1, USD: 0.27, AED: 0.99, EGP: 12.5 } }
};

let state = { products: [], cart: [], wishlist: [], currentLang: 'ar', currentCurrency: 'SAR' };
let currentLensIdx = 0;

function adjColor(hex, amount) {
    hex = hex.replace('#','');
    const r = Math.max(0, Math.min(255, parseInt(hex.substring(0,2),16)+amount));
    const g = Math.max(0, Math.min(255, parseInt(hex.substring(2,4),16)+amount));
    const b = Math.max(0, Math.min(255, parseInt(hex.substring(4,6),16)+amount));
    return '#'+[r,g,b].map(c=>c.toString(16).padStart(2,'0')).join('');
}

function generateLensGradient(color) {
    return `radial-gradient(circle at 40% 35%,${color},${adjColor(color,-30)},${adjColor(color,-70)})`;
}

function getPrice(product, currency = state.currentCurrency) {
    const rate = CONFIG.i18n.exchangeRates[currency] || 1;
    return Math.round(product.price * rate);
}

function getCurrencySymbol(currency = state.currentCurrency) {
    return { SAR: 'ر.س', USD: '$', AED: 'د.إ', EGP: 'ج.م' }[currency] || currency;
}

function getText(ar, en) { return state.currentLang === 'ar' ? ar : (en || ar); }

function getAvailableStock(product) {
    const real = product.stockReal || product.stock || 0;
    const reserved = product.stockReserved || 0;
    return Math.max(0, real - reserved);
}

function updateStock(productId, changeReal = 0, changeReserved = 0) {
    const product = state.products.find(p => p.id === productId);
    if (!product) return false;
    product.stockReal = Math.max(0, (product.stockReal || 0) + changeReal);
    product.stockReserved = Math.max(0, (product.stockReserved || 0) + changeReserved);
    saveData();
    return true;
}

async function loadData() {
    try {
        console.log('🔄 جاري تحميل البيانات من Supabase...');
        
        const { data: catsData } = await supabaseClient.from('categories').select('*').order('name_ar');
        const { data: prodsData } = await supabaseClient.from('products').select('*').eq('visible', true).order('name_ar');
        
        if (prodsData && prodsData.length > 0) {
            state.products = prodsData.map(p => ({
                ...p,
                name: p.name_ar,
                enName: p.name_en,
                categoryId: p.category_id,
                stockReal: p.stock_real || 0,
                stockReserved: p.stock_reserved || 0,
                gradient: p.gradient || generateLensGradient(p.color)
            }));
            
            const catMap = {};
            if (catsData) {
                catsData.forEach(c => {
                    catMap[c.id] = { ar: c.name_ar, en: c.name_en, color: c.color };
                });
            }
            
            state.products.forEach(p => {
                const catInfo = catMap[p.categoryId] || { ar: 'عام', en: 'General', color: '#c9a84c' };
                p.categoryName = catInfo.ar;
                p.categoryNameEn = catInfo.en;
                p.categoryColor = catInfo.color;
            });
            
            console.log(`✅ تم تحميل ${state.products.length} منتج`);
        }
        
        const savedCart = localStorage.getItem('lensora_cart');
        if (savedCart) state.cart = JSON.parse(savedCart);
        
    } catch (error) {
        console.error('فشل في تحميل البيانات:', error);
    }
}

function saveData() {
    localStorage.setItem('lensora_cart', JSON.stringify(state.cart));
}

function getProduct(id) { 
    const p = state.products.find(p => p.id === id);
    if (!p) return { stockReal: 0, stockReserved: 0, price: 0, name: '', gradient: '' };
    return {...p, stockReal: p.stockReal || 0, stockReserved: p.stockReserved || 0};
}

function showToast(msg, type = 'info') {
    const t = document.getElementById('toast');
    t.textContent = msg; 
    t.className = `toast ${type} show`;
    setTimeout(() => t.classList.remove('show'), 3000);
}

function initSmoothSlider() {
    const track = document.getElementById('sliderTrack');
    if (!track) return;
    
    const visibleProducts = state.products.filter(p => p.visible !== false);
    const GAP = 28, CARD_W = 340, ITEM_W = CARD_W + GAP;
    const grouped = {};
    
    visibleProducts.forEach(p => {
        const catId = p.categoryId;
        if (!grouped[catId]) {
            grouped[catId] = {
                id: catId,
                arName: p.categoryName,
                enName: p.categoryNameEn,
                color: p.categoryColor || '#c9a84c',
                lenses: []
            };
        }
        grouped[catId].lenses.push(p);
    });
    
    const COLORS_DATA = Object.values(grouped);
    const total = COLORS_DATA.length;
    
    if (total === 0) {
        track.innerHTML = '<div style="color:white;text-align:center;width:100%;padding:40px">لا توجد منتجات معروضة حالياً</div>';
        return;
    }
    
    let html = '';
    COLORS_DATA.forEach((cat, i) => {
        if (!cat.lenses.length) return;
        const main = cat.lenses[0];
        const totalStock = cat.lenses.reduce((s,l) => s + getAvailableStock(l), 0);
        const dots = cat.lenses.map(l => `<div style="width:22px;height:22px;border-radius:50%;background:${l.gradient||generateLensGradient(l.color)};border:2px solid rgba(255,255,255,.1)"></div>`).join('');
        
        html += `<div class="slider-card" data-cat="${i}">
            <div class="card-visual" style="background:linear-gradient(135deg,${adjColor(cat.color,-60)},${cat.color})">
                <div class="card-lens-sphere">
                    <div class="card-lens-inner" style="background:${main.gradient||generateLensGradient(main.color)}"></div>
                </div>
                <div style="position:absolute;bottom:14px;left:50%;transform:translateX(-50%);display:flex;gap:8px">${dots}</div>
            </div>
            <div class="card-body">
                <div class="card-badge"><span style="width:5px;height:5px;border-radius:50%;background:var(--gold);display:inline-block;margin-left:5px"></span>${getText(cat.arName,cat.enName)}</div>
                <div class="card-name">مجموعة ${getText(cat.arName,cat.enName)}</div>
                <div class="card-count">${cat.lenses.length} لون متاح · إجمالي المتاح: ${totalStock}</div>
                <div class="card-footer">
                    <div class="card-price">يبدأ من <strong>${getPrice(main)} ${getCurrencySymbol()}</strong></div>
                    <button class="card-btn" onclick="event.stopPropagation();openLensModal(${i})"><span>اكتشفي ✦</span></button>
                </div>
            </div>
        </div>`;
    });
    
    track.innerHTML = html;
    document.getElementById('sliderDots').innerHTML = COLORS_DATA.map((_, i) => 
        `<div class="slider-dot ${i===0?'active':''}" data-idx="${i}"></div>`
    ).join('');
    
    let activeCatIdx = 0, currentPos = 0;
    
    function getCenterOffset() {
        const vp = document.querySelector('.slider-viewport');
        return vp ? (vp.offsetWidth - CARD_W) / 2 : 0;
    }
    
    function snapToIndex(idx) {
        const normalized = ((idx % total) + total) % total;
        activeCatIdx = normalized;
        const pos = idx * ITEM_W - getCenterOffset();
        track.style.transition = 'transform 0.85s cubic-bezier(.22,1,.36,1)';
        track.style.transform = `translateX(-${pos}px)`;
        currentPos = pos;
        updateDots(normalized);
    }
    
    function updateDots(idx) {
        const normalized = ((idx % total) + total) % total;
        document.querySelectorAll('#sliderDots .slider-dot').forEach((d, i) => {
            d.classList.toggle('active', i === normalized);
        });
    }
    
    const startCopy = 1;
    const centerOffset = getCenterOffset();
    currentPos = (startCopy * total) * ITEM_W - centerOffset;
    track.style.transform = `translateX(-${currentPos}px)`;
    updateDots(0);
    
    document.getElementById('prevBtn').onclick = () => { activeCatIdx--; snapToIndex(activeCatIdx); };
    document.getElementById('nextBtn').onclick = () => { activeCatIdx++; snapToIndex(activeCatIdx); };
    
    document.getElementById('sliderDots').onclick = (e) => {
        const dot = e.target.closest('.slider-dot');
        if (!dot) return;
        const idx = parseInt(dot.dataset.idx);
        activeCatIdx = idx;
        snapToIndex(startCopy * total + idx);
    };
    
    track.onclick = (e) => {
        const card = e.target.closest('.slider-card');
        if (!card) return;
        const catIdx = parseInt(card.dataset.cat);
        if (!isNaN(catIdx)) openLensModal(catIdx);
    };
}

function openLensModal(ci) {
    currentLensIdx = 0;
    const visibleProducts = state.products.filter(p => p.visible !== false);
    const grouped = {};
    visibleProducts.forEach(p => {
        if (!grouped[p.categoryId]) grouped[p.categoryId] = [];
        grouped[p.categoryId].push(p);
    });
    const catIds = Object.keys(grouped);
    const targetCatId = catIds[ci % catIds.length];
    const catProducts = grouped[targetCatId] || visibleProducts;
    if (!catProducts.length) return;
    
    document.getElementById('modalTitle').textContent = `مجموعة ${catProducts[0].categoryName}`;
    renderLensSlider(catProducts);
    document.getElementById('lensModal').classList.add('open');
    document.body.style.overflow = 'hidden';
}

function closeLensModal() {
    document.getElementById('lensModal').classList.remove('open');
    document.body.style.overflow = '';
}

function renderLensSlider(products) {
    document.getElementById('lensTrack').innerHTML = products.map((p, li) => {
        const available = getAvailableStock(p);
        const st = available === 0 ? 'نفذ' : available <= 5 ? `باقي ${available}` : `${available} قطعة`;
        return `<div class="lens-slide">
            <div class="lens-visual">
                <div class="lens-visual-inner"><div class="lens-circle" style="background:${p.gradient||generateLensGradient(p.color)}"></div></div>
            </div>
            <div class="lens-details">
                <h3>${getText(p.name,p.enName)}</h3>
                <p class="lens-desc">${p.description||'وصف المنتج'}</p>
                <div class="lens-meta">
                    <div class="meta-item"><div class="label">السعر</div><div class="value">${getPrice(p)} ${getCurrencySymbol()}</div></div>
                    <div class="meta-item"><div class="label">المتاح</div><div class="value">${st}</div></div>
                </div>
                <div class="qty-selector">
                    <label>الكمية:</label>
                    <div class="qty-ctrl">
                        <button onclick="changeModalQty(-1,${li})">−</button>
                        <div class="qty-display" id="mq_${li}">1</div>
                        <button onclick="changeModalQty(1,${li})">+</button>
                    </div>
                </div>
                <button class="add-lens-btn" onclick="addFromSlider('${p.id}',${li})" ${available===0?'disabled':''}>
                    <span>${available===0?'غير متوفر':'🛒 أضف للسلة'}</span>
                </button>
            </div>
        </div>`;
    }).join('');
}

function changeModalQty(delta, li) {
    const el = document.getElementById(`mq_${li}`);
    if (!el) return;
    let v = parseInt(el.textContent) + delta;
    v = Math.max(1, Math.min(v, 10));
    el.textContent = v;
}

function addFromSlider(lensId, li) {
    const p = getProduct(lensId);
    const available = getAvailableStock(p);
    if (!p || available <= 0) { showToast('⚠️ المنتج غير متاح', 'error'); return; }
    
    const el = document.getElementById(`mq_${li}`);
    const qty = el ? parseInt(el.textContent) : 1;
    if (available < qty) { showToast(`⚠️ الكمية المتاحة فقط: ${available}`, 'warning'); return; }
    
    const existing = state.cart.find(c => c.productId === lensId);
    if (existing) {
        if (available < existing.qty + qty) { showToast('⚠️ الكمية تتجاوز المتاح', 'warning'); return; }
        existing.qty += qty;
    } else {
        state.cart.push({ productId: lensId, qty });
    }
    
    updateStock(lensId, 0, qty);
    saveData();
    updateCartBadge();
    showToast(`✅ "${getText(p.name,p.enName)}" أضيف للسلة`, 'success');
    if (el) el.textContent = '1';
}

function updateCartBadge() {
    const total = state.cart.reduce((s, c) => s + c.qty, 0);
    const badge = document.getElementById('cartBadge');
    badge.textContent = total;
    badge.style.display = total > 0 ? 'flex' : 'none';
}

function openCart() { renderCart(); document.getElementById('cartOverlay').classList.add('open'); document.getElementById('cartPanel').classList.add('open'); }
function closeCart() { document.getElementById('cartOverlay').classList.remove('open'); document.getElementById('cartPanel').classList.remove('open'); }

function renderCart() {
    const list = document.getElementById('cartItemsList'), bottom = document.getElementById('cartBottom');
    if (state.cart.length === 0) {
        list.innerHTML = '<div style="text-align:center;padding:80px 20px;color:var(--text-dim)"><div style="font-size:64px;margin-bottom:16px;opacity:.25">👁️</div><p>السلة فارغة</p></div>';
        bottom.innerHTML = '';
        return;
    }
    
    list.innerHTML = state.cart.map(c => {
        const p = getProduct(c.productId);
        if (!p) return '';
        return `<div class="ci">
            <div class="ci-color" style="background:${p.gradient||generateLensGradient(p.color)}"></div>
            <div class="ci-info">
                <div class="ci-name">${getText(p.name,p.enName)}</div>
                <div class="ci-cat">${p.categoryName||''}</div>
                <div class="ci-bottom">
                    <span class="ci-price">${getPrice(p) * c.qty} ${getCurrencySymbol()}</span>
                    <div class="ci-qty">
                        <button onclick="changeCartQty('${c.productId}',-1)">−</button>
                        <span>${c.qty}</span>
                        <button onclick="changeCartQty('${c.productId}',1)">+</button>
                    </div>
                </div>
            </div>
            <button class="ci-remove" onclick="removeFromCart('${c.productId}')">🗑</button>
        </div>`;
    }).join('');
    
    const sub = state.cart.reduce((s, c) => { const p = getProduct(c.productId); return s + (p ? getPrice(p) * c.qty : 0); }, 0);
    const shipping = sub >= 200 ? 0 : 15, total = sub + shipping;
    
    bottom.innerHTML = `
        <div class="cb-row"><span>المجموع</span><span>${sub} ${getCurrencySymbol()}</span></div>
        <div class="cb-row"><span>الشحن ${shipping===0?'(مجاني)':''}</span><span>${shipping===0?'مجاني':shipping+' '+getCurrencySymbol()}</span></div>
        <div class="cb-row total"><span>الإجمالي</span><span>${total} ${getCurrencySymbol()}</span></div>
        <button class="checkout-btn" onclick="openCheckoutModal()">🧾 إتمام الشراء</button>
    `;
}

function changeCartQty(pid, delta) {
    const item = state.cart.find(c => c.productId === pid), p = getProduct(pid);
    if (!item || !p) return;
    const available = getAvailableStock(p);
    if (delta > 0 && available < item.qty + delta) { showToast('⚠️ الكمية غير متاحة', 'warning'); return; }
    item.qty += delta;
    if (item.qty <= 0) { updateStock(pid, 0, -item.qty); removeFromCart(pid); return; }
    saveData(); updateCartBadge(); renderCart();
}

function removeFromCart(pid) {
    const item = state.cart.find(c => c.productId === pid);
    if (item) { updateStock(pid, 0, -item.qty); }
    state.cart = state.cart.filter(c => c.productId !== pid);
    saveData(); updateCartBadge(); renderCart();
    showToast('✅ تمت الإزالة من السلة', 'success');
}

function openCheckoutModal() {
    if (state.cart.length === 0) return;
    closeCart();
    document.getElementById('checkoutOverlay').classList.add('show');
}

function closeCheckoutModal() { document.getElementById('checkoutOverlay').classList.remove('show'); }

async function handleCheckout(e) {
    e.preventDefault();
    const btn = e.target.querySelector('.checkout-btn-submit');
    btn.disabled = true; btn.innerHTML = '⏳ جاري المعالجة...';
    
    try {
        const totalAmount = state.cart.reduce((s, c) => { const p = getProduct(c.productId); return s + (p ? getPrice(p) * c.qty : 0); }, 0);
        
        const invoiceData = {
            id: 'INV-' + Date.now().toString(36).toUpperCase().slice(-6) + '-' + Math.random().toString(36).substr(2,4).toUpperCase(),
            created_at: new Date().toISOString(),
            customer_name: document.getElementById('cName').value.trim(),
            customer_phone: document.getElementById('cPhone').value.trim(),
            customer_phone_secondary: document.getElementById('cPhone2').value.trim() || null,
            customer_city: document.getElementById('cCity').value.trim() || null,
            customer_district: document.getElementById('cDistrict').value.trim() || null,
            customer_street: document.getElementById('cStreet').value.trim() || null,
            customer_building: document.getElementById('cBuilding').value.trim() || null,
            customer_apartment: document.getElementById('cApartment').value.trim() || null,
            customer_notes: document.getElementById('cNotes').value.trim() || null,
            delivery_method: document.getElementById('cDelivery').value,
            items: state.cart.map(c => ({ productId: c.productId, qty: c.qty, name: getProduct(c.productId).name })),
            total: totalAmount,
            currency: state.currentCurrency,
            status: 'pending'
        };
        
        const { error } = await supabaseClient.from('invoices').insert([invoiceData]);
        if (error) throw error;
        
        state.cart.forEach(c => { updateStock(c.productId, -c.qty, -c.qty); });
        
        state.cart = [];
        saveData();
        updateCartBadge();
        closeCheckoutModal();
        e.target.reset();
        showToast('✅ تم إرسال طلبك بنجاح! 🎉', 'success');
    } catch (err) {
        console.error('Checkout error:', err);
        showToast('❌ حدث خطأ', 'error');
    } finally {
        btn.disabled = false; btn.innerHTML = '✅ تأكيد الطلب';
    }
}

document.getElementById('currencySelect').onchange = function() {
    state.currentCurrency = this.value;
    initSmoothSlider();
    renderCart();
};

document.addEventListener('DOMContentLoaded', async () => {
    await loadData();
    initSmoothSlider();
    updateCartBadge();
});
</script>
</body>
</html>
