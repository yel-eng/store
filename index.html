<!-- 
    ملف: index.html
    الوصف: واجهة المتجر الرئيسية - تم توحيد متغيرات الحفظ وإصلاح الربط مع الأدمن
-->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lensora — عدسات ملونة فاخرة</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5.1.0/index.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/playfair-display@5.1.0/index.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
    :root{--bg:#0a0808;--card-bg:rgba(18,14,12,.72);--gold:#c9a84c;--text:#f5ede0;--text-dim:#8a7e73;--radius:24px}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;line-height:1.6}
    button{cursor:pointer;border:none;font-family:inherit;background:none;color:inherit}
    .nav{position:fixed;top:0;left:0;right:0;padding:18px 5%;display:flex;justify-content:space-between;align-items:center;background:rgba(6,4,4,.85);backdrop-filter:blur(20px);z-index:100;border-bottom:1px solid rgba(201,168,76,.1)}
    .nav-logo{font-family:'Playfair Display',serif;font-size:24px;color:var(--gold);text-decoration:none}
    .cart-btn{background:rgba(201,168,76,.1);color:var(--gold);padding:10px 20px;border-radius:50px;border:1px solid var(--gold)}
    .hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:100px 20px}
    .hero-title{font-family:'Playfair Display',serif;font-size:60px;color:var(--gold);margin-bottom:20px}
    .cta-primary{padding:16px 40px;background:var(--gold);color:#000;border-radius:50px;font-weight:bold;font-size:16px}
    .slider-track{display:flex;gap:20px;overflow-x:auto;padding:20px}
    .card{flex:0 0 300px;background:var(--card-bg);padding:20px;border-radius:var(--radius);border:1px solid rgba(201,168,76,.1)}
    .card-img{width:100%;height:200px;background:#222;border-radius:12px;margin-bottom:15px}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:2000;display:none;align-items:center;justify-content:center}
    .modal.show{display:flex}
    .modal-content{background:var(--bg);padding:30px;border-radius:var(--radius);width:90%;max-width:500px;border:1px solid var(--gold)}
    .form-group{margin-bottom:15px}
    .form-group label{display:block;margin-bottom:5px;color:var(--text-dim)}
    .form-group input{width:100%;padding:10px;background:rgba(255,255,255,.05);border:1px solid #333;color:#fff;border-radius:8px}
    .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--gold);color:#000;padding:10px 20px;border-radius:8px;display:none}
</style>
</head>
<body>
    <nav class="nav">
        <a href="#" class="nav-logo">LENSORA</a>
        <button class="cart-btn" onclick="openCart()">🛒 السلة (<span id="cartCount">0</span>)</button>
    </nav>

    <header class="hero">
        <h1 class="hero-title">LENSORA</h1>
        <p style="color:var(--text-dim);margin-bottom:30px">عدسات ملونة فاخرة</p>
        <button class="cta-primary" onclick="document.getElementById('products').scrollIntoView({behavior:'smooth'})">تسوقي الآن</button>
    </header>

    <section id="products">
        <div class="slider-track" id="sliderTrack">
            <!-- Products will be loaded here -->
        </div>
    </section>

    <!-- Cart Panel -->
    <div class="modal" id="cartModal">
        <div class="modal-content">
            <h2 style="color:var(--gold);margin-bottom:20px">سلة المشتريات</h2>
            <div id="cartItems" style="margin-bottom:20px;max-height:300px;overflow-y:auto"></div>
            <div style="display:flex;justify-content:space-between;font-weight:bold;margin-bottom:20px">
                <span>الإجمالي:</span>
                <span id="cartTotal">0 ر.س</span>
            </div>
            <button class="cta-primary" style="width:100%" onclick="openCheckout()">إتمام الشراء</button>
            <button onclick="closeCart()" style="margin-top:10px;color:var(--text-dim);width:100%">إغلاق</button>
        </div>
    </div>

    <!-- Checkout Form -->
    <div class="modal" id="checkoutModal">
        <div class="modal-content">
            <h2 style="color:var(--gold);margin-bottom:20px">بيانات التوصيل</h2>
            <form id="checkoutForm" onsubmit="submitOrder(event)">
                <div class="form-group"><label>الاسم الكامل</label><input type="text" id="cName" required></div>
                <div class="form-group"><label>رقم الهاتف</label><input type="tel" id="cPhone" required></div>
                <div class="form-group"><label>المدينة</label><input type="text" id="cCity" required></div>
                <div class="form-group"><label>العنوان التفصيلي</label><input type="text" id="cAddress"></div>
                <button type="submit" class="cta-primary" style="width:100%">تأكيد الطلب</button>
                <button type="button" onclick="closeCheckout()" style="margin-top:10px;color:var(--text-dim);width:100%">إلغاء</button>
            </form>
        </div>
    </div>

    <div class="toast" id="toast"></div>

<script>
    // ========== SUPABASE CONFIG ==========
    const SUPABASE_URL = 'https://bdgnhmqmttiksuhoamil.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJkZ25obXFtdHRpa3N1aG9hbWlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5NjUwNTEsImV4cCI6MjA5NDU0MTA1MX0.X9-9HMqbXod2vyHRpd26MuBNTcqo4VERUwRI1o5lzMw';
    const { createClient } = supabase;
    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let state = {
        products: [
            { id: 'p1', nameAr: 'عسل ذهبي', price: 85, color: '#D4A056' },
            { id: 'p2', nameAr: 'شوكولاتة', price: 85, color: '#8B4513' },
            { id: 'p3', nameAr: 'أزرق محيط', price: 90, color: '#2E6CB5' }
        ],
        cart: JSON.parse(localStorage.getItem('solina_cart')) || []
    };

    function renderProducts() {
        const track = document.getElementById('sliderTrack');
        track.innerHTML = state.products.map(p => `
            <div class="card">
                <div class="card-img" style="background:radial-gradient(circle, ${p.color}, #000)"></div>
                <h3 style="color:var(--gold);margin-bottom:10px">${p.nameAr}</h3>
                <p style="margin-bottom:15px">${p.price} ر.س</p>
                <button class="cta-primary" style="width:100%;padding:10px;font-size:14px" onclick="addToCart('${p.id}')">أضف للسلة</button>
            </div>
        `).join('');
    }

    function addToCart(id) {
        const product = state.products.find(p => p.id === id);
        const existing = state.cart.find(c => c.id === id);
        if (existing) existing.qty++;
        else state.cart.push({ ...product, qty: 1 });
        
        localStorage.setItem('solina_cart', JSON.stringify(state.cart));
        updateCartUI();
        showToast('✅ تمت الإضافة للسلة');
    }

    function updateCartUI() {
        document.getElementById('cartCount').textContent = state.cart.reduce((s, c) => s + c.qty, 0);
        const itemsEl = document.getElementById('cartItems');
        const total = state.cart.reduce((s, c) => s + (c.price * c.qty), 0);
        document.getElementById('cartTotal').textContent = total + ' ر.س';
        
        itemsEl.innerHTML = state.cart.map(c => `
            <div style="display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid #333">
                <span>${c.nameAr} (${c.qty})</span>
                <span style="color:var(--gold)">${c.price * c.qty} ر.س</span>
            </div>
        `).join('') || '<p style="text-align:center;color:var(--text-dim)">السلة فارغة</p>';
    }

    function openCart() { document.getElementById('cartModal').classList.add('show'); updateCartUI(); }
    function closeCart() { document.getElementById('cartModal').classList.remove('show'); }
    function openCheckout() { closeCart(); if(state.cart.length > 0) document.getElementById('checkoutModal').classList.add('show'); else showToast('❌ السلة فارغة'); }
    function closeCheckout() { document.getElementById('checkoutModal').classList.remove('show'); }
    function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 3000); }

    async function submitOrder(e) {
        e.preventDefault();
        const btn = e.target.querySelector('button[type="submit"]');
        btn.textContent = 'جاري الإرسال...';
        btn.disabled = true;

        const invoiceData = {
            id: 'INV-' + Date.now(),
            created_at: new Date().toISOString(),
            customer_name: document.getElementById('cName').value,
            customer_phone: document.getElementById('cPhone').value,
            customer_city: document.getElementById('cCity').value,
            customer_address: document.getElementById('cAddress').value,
            items: state.cart,
            total: state.cart.reduce((s, c) => s + (c.price * c.qty), 0),
            status: 'pending'
        };

        try {
            // Save to Supabase (Primary)
            await supabaseClient.from('invoices').insert([invoiceData]);
            
            // Save to LocalStorage (Backup for Admin)
            let localInvoices = JSON.parse(localStorage.getItem('solina_inv')) || [];
            localInvoices.unshift(invoiceData);
            localStorage.setItem('solina_inv', JSON.stringify(localInvoices));

            state.cart = [];
            localStorage.setItem('solina_cart', JSON.stringify([]));
            updateCartUI();
            closeCheckout();
            showToast('✅ تم استلام طلبك بنجاح!');
            e.target.reset();
        } catch (err) {
            console.error(err);
            showToast('❌ حدث خطأ أثناء الإرسال');
        } finally {
            btn.textContent = 'تأكيد الطلب';
            btn.disabled = false;
        }
    }

    // Init
    renderProducts();
    updateCartUI();
</script>
</body>
</html>
